body:
  text: 沙門高範撰次八識大旨識謂了別為義瑜伽倫記第一曰毗若南此云識了別為義又曰心意識義自有通別別名心意識者賴耶是心以能集起三界生死色心法故末那名意以與六識為同時根生六識六識名識以對六境分別強故二通名心意識謂八識中一一皆有集起名心能生名意了別名識故今據通名云了別為義二十唯識疏謂諸經論所說心意識及了別此四名其體無異但名差別心積集義意思量義識了別義論第二曰了謂了別即是行相識以了別為行相故乃至此了別用見分所攝此釋第八識行相文也問見分與了別其體為異為同耶答了別即是見分所攝見分未必了別謂見分之言通心心所了別之言局心王應非全同義燈第四了有二義一緣境名了通心及心所二行相了別非所但王而作意等亦言了者說緣境了非行相了或有單復單言了者即通王所言了別者非所唯王一眼識者疏曰眼是所依而體是識依眼識識名眼識從所依得名乃至第六亦然泰云大乘中如眼識於一念間取青黃等多色境界有青黃等多種行解取相各異互不相違廣說乃至意識亦爾備云婆沙第三師義當此論眼識取色有四師解如倫記第十三說清淨色瑜伽論曰諸色自相有三種一清淨色二清淨所取色三意取色謂四大種所造五識所依五清淨色眼等處攝名清淨色以果知因等演祕二云𪵬明此知略有四種一以因比果二以果比因三以體比用四以用比體以果知因果發識也是心法因根義是色法也是則異類因果果心法因色法故由用比體者發識取境根用由發識用比知定應有根體也顯形表瑜伽論曰顯有十三謂青黃赤白影光明暗雲烟塵霧空一顯色形色有十種謂長短方圓粗細高下若正若不正表色八謂取捨屈申行住坐臥倫師云今依大乘唯有三句一顯非形青等十三二形非顯者長等十色三俱非句者無表色影光倫記曰影與暗別者真諦釋俱舍云如雲障日成陰餘色於中猶顯現可見說為影須彌障日成陰餘色於中隱不可見名暗灮與明別者如俱舍云日炎名灮星月火藥寶珠電炎稱明長短與高下別者長短據四邊高下據處中謂中凸名高中凹名下也四顯色實餘色皆假略纂云除青黃赤白外餘顯形表色皆是根本四色差別依四根本色立餘差別故皆是假立論五十四問長短等所說形色當言實有為假有耶答當言假有何以故積集而住故名形唯有衆色可得餘形色相不可得故又必相待相待法有自性者彼有雜亂過失如車等彼覺可壞故倫師解曰雖無細微積聚而有粗青等積集成形言雜亂過者以有一法亦長亦短過故又如車等彼覺可壞者如取輪軸時失彼車等以相待故同學云積短為長失本短相下長為短亦失本長既長短無定相假境義炳然也眼識所緣唯是實境同學曰未轉依五識必緣實境疏曰唯取五識一向緣實問假境何識緣之耶答三重轉五俱意緣之響聲倫記曰今此論及對法所列聲中皆無響聲唯顯揚說彼云或依託崖谷所發響聲此中據法師云因受等三是有體聲餘竝假有是差別故平等香倫曰此有二解一云依四諦論解正量部香有三種香臰平等平等者無臰香也一云長養根大名為好香損害名惡無前二用名平等香味謂苦酢又曰味中苦酢等六是實餘可意味等假空行風中無俱生香等者倫曰辨空行風無根本俱生之香但有假名如風過華香逐風來身者積聚及依止義疏云身者諸大造等合聚名身或依止名身即一形之總稱諸根大造等者已下通伏難此五根章文諸字上有雖字意云若以積聚依止義名身眼根等亦可名身有積聚依止義故通云雖眼根等有積聚依止義彼為少分法依止積聚故不名身獨身名身謂滑性等瑜伽五十四云若觸處中所說造色滑乃至勇當知即於大種分位假施設有謂於大種清淨性假立滑性於大種堅實性假立重性於大種不清淨不堅實性假立歰性及輕性於大種不清淨慢緩性假立軟性由水與風和合生故假立有泠由闕任持不平等故假立飢渴及弱力由無所闕無不平等故假立強力及飽由由不平等變異錯亂不平等故假立病由時分變異不平等故假立老由命根變異不平等故假立死由血有過患不平等假立癢由惡飲食不平等故假立悶絶由地與水和令生故假立黏由往來勞倦不平等故假立疲極若遠離彼由平等故假立憩息由除垢等離萎悴故假立勇鋭如是一切說諸大種總有六位謂淨不淨位堅不堅位慢緩位和合位不平等位平等位景師云二十種觸竝於四大分位假立基云此中解觸有十九種如對法有二十二種無急緩劣三何以無者略也不立生為觸所以如四相中病老是一今此何故分二耶今此非四相不例也其觸者從果為名即身上有末摩死近之時今身即死此觸從果為名老觸亦然此觸能生老等名老觸心法四分義私記曰問其以心法為相分義如何答如後念意識緣前念心又他心智證他人心也故疏云或別人心或前後心定位意識唯是現量因明大疏曰然有二類一定位二散心定心徵湛境皆明證隨緣何法皆名現量一切散心若親於境得自體亦皆現量與五俱意或唯現量今謂集量論說五識同時意識是現量故同學抄云且約五同緣邊而已云云或通現比等此約五俱意同時緣十八界也望與五識同緣五塵通現量或約緣五根邊通比或約緣不相應法邊通非不相應法其體色心二法而不緣色心緣得等是則於境異轉也五俱意通三量為一念耶為前後耶有兩諍也笠置上人以一念通三義為正松室上人以前後通三義為正同學八云於五俱意頓緣十八界質相見各有十八許一念類境許一念三量者蓋此謂也七末那識疏曰於聖教中別名末那總名識故末那是意故蕳後心前識但立意名恆審思故此翻云意思量為義疏云意有二義一思量義二依止義常恆緣第八見分思慮量度自內我緣於種子有根身器界倫記云唯識說第八識緣執受處即諸種子及有根身器世間等對法論說緣五色根四塵一分除聲五十五說緣五色根五外分理實亦緣聲然對法論且說恆相續境故不取聲何為種子成唯識論云諸種子者謂諸相名分別習氣疏云即是一切有漏善等諸法種子下解五位中此三唯有漏論說非無漏無漏種子此識既不緣但為彼依故非執受等相名分別者唯識論曰有漏心心所變似所詮名為相似能詮現施設為名能變心等立為分別其體則是名相分別習氣也由彼彼緣此習氣生現行果譬如草木種生其芽也謂本識中親生自果㓛能差別疏述曰此出體言本識者顯種所在蕳經部師色心等持種親生自果蕳異𤏅因望所生果非種子故要望自品能親生故㓛能差別蕳現行七轉識等望所生種雖是因緣亦親生果是現法故非名㓛能故以㓛能顯種子相今謂㓛能言蕳現行七轉識何故不蕳第八現行耶答於為因緣者蕳之故不蕳第八現行第八非能熏故於親生自果義中蕳非㓛能故此與本識及所生果不一不異第二一異分別門述曰種望所依及所生果為不一異此即立宗何所以然體用因果理應爾故述曰本識是體種子是用種子是因所生是果此之二法理應如是不一不異雖非一異第三問答辨假實門如生望法非一異即說生為假種望於法非是一異種子應非實泉抄生起問云今大乘意種子與本識不一異者種子如生住等四相望法非一異說其體假種望本識非一異故假應非實今為答此云雖非一異等疏云生等假法如龜毛等體是無法非因緣故種子望法即是因緣故云體實有漏無漏種各有二類論第二有三義一者唯本有種護月云種子本有由新熏發方生故名為新二者唯新熏種難陀云本識親種無始新熏不能自得異熟果要由淨業新熏招集方乃能生故名為新勝軍亦同三者新古合成護法云名言及業種各具法爾新熏然其名言種子雖復法爾舊成無有支熏不能得果新舊合用其果方生望業招果與其新名各有二類下舉護法正義倫記云測述西國三釋一依護法云以本有法爾無漏種子能生一切無漏現行是故初地已上無漏現行皆有因緣或有地前新熏種子是有漏故但是增上緣初地已上新熏無漏種子望彼現行無漏亦得作因緣以是無漏故二護月云唯有法爾種子即用此種子為因緣生現行無漏三勝軍云唯有新熏今此論又就可生義說為種子諸有情無始時來等疏云自下第三申其正義應信本有無漏種子至解脫分善根已厺名勝進位但熏增長熏今增長疏云種解脫分善根已厺聞正法時由現行有漏及自因緣所熏有漏種為增上緣令其本有無漏種子亦得增長展轉增勝即以所增無漏勝種後時正生出世之心亦說無漏所增長種名聞熏習復熏成種謂入見道且如無漏既有本有及與新熏有漏法種子類此可悉問有漏無漏相違法云何有漏聞熏令增長無漏種子耶答流轉位分別俱生二障覆伏無漏種子不令得自在然初發心住位發深固大菩提心以來修有漏六波羅密善根及如實尋思觀依之無漏種子少得自在是名增長雖有漏聞熏及有漏觀其體善法故令無漏種子與力自在也有根身疏云總身之中有別根故名有根身等扶塵根倫云扶根是眼之處世俗呼之為眼故即扶五根色香味觸之四境也器界謂如世器領納諸物山河大地能納有情故名器界者差別義欲界等界種種差別故具有能藏所藏執藏義故疏曰能藏所藏執藏義故為雜染法互為緣故我見緣故此文雜染能所藏中唯有能藏令雜染等法不失故我愛緣之為執藏義即識為所藏為雜染互為緣故疏云解能所藏諸有漏法皆名雜染非唯染法梵云僧吉𮀉此名雜染若不云僧即唯染也有云就互為緣祕有三釋一者第八現所持種相望互為緣也謂第八持種時種為所藏現第八為能藏也此義現第八因種果也亦此種生第八現種為能藏現第八為所藏也此義種因現第八果也如是互為緣也今謂祕三釋中初釋為勝此論文下疏無互為緣釋能持染種至此識為所藏文釋與雜染互為緣故論文文依此釋文解互為緣故云雜染通有漏三性法現行種子第八為雜染種子為緣能持雜染現行法為第八為緣能熏種子故云互為緣故初能藏義次所藏義也有情執為自內我故疏曰解執藏義唯煩惱障義非所知障義不爾無學應有此名此不別執為其我所及與他我名自內我內緣相續解云唯內緣局第七第八一分通外緣器界故第七非量解云唯見分非量轉自證分現量也現等三量現量謂無分別已下三十字入正理論文離名言分別種類分別等故云無分別非全無緣慮用是則明了無分別也於色等境境字論為義大疏曰言色等者等取香等義謂境義乃至於色等境上雖無映障若有名種等諸門分別亦非現量故然離分別略有四類一五識身二五俱意三諸自證分四修定者前記云且如意識與五識同時起亦緣其境不生分別故名現量自證者自證分緣見分之時亦名現量即此見分為自證分境也諸定心者在定之時亦緣其境雖緣境體已其定內亦名現量故皆後之三種亦離分別然理門中唯取五識疏曰言於色等義是五識故云云此四類心唯五識現體非一名為現現各各附自境體離貫通緣名為別轉由此現現各各別緣故名現量又曰現量行離動搖明證衆境親自體故名現量能緣行相不動不搖因循照境不籌不度離分別心照符前境明局自體故名現量謂患翳目二十唯識疏曰翳是障眼病為緣意見髮等瑜伽論云翳眩者於一月處見多月像景釋眼根識同取多月以是錯亂故非現量是故五根五識有量非量不得皆是現量所攝今解眼識及同緣意識俱取一月而不明了故後尋求意識錯亂取多月眼識等雖不明了而實緣一是故五識但是現量比量謂於所比義有正智生真界云比量者謂比擬度量如見烟度火論曰謂藉衆相觀於義相有三種由彼為因於所比義有正智生了知有火或無常等是名比量是近及遠等問云現量比量及念俱非比量體云何名比量答此三能為比量之智以近遠生因故因從果名有分別智於境異轉此二句正理論文也境字為義大疏云分別智謂有如前帶名種等諸分別起之智不稱實境別𡚶解生名於義異轉名似現量謂見杌為人等已下大疏釋文見為人至及瓶衣等釋異轉不以本自相至謂為實有釋分別智及瓶衣等大疏云問如第七識緣第八執我可名非量凡緣瓶衣既非執心何名非量答應知非量不要執心但不稱境別作餘解即名非量以緣瓶心雖不必執但惑亂故謂為實瓶故是非量不以本自相等疏云諸有了瓶衣等智不稱實境𡚶分別生名分別智由彼瓶衣等以下釋似現量前記云此似現量有兩解第一云但意識緣共相至名似現量者此意但由意識分別作瓶衣解謂自眼見若據實論眼但見望境不見瓶衣即由意識分別作瓶衣解即是第一解但約意識解為非盡理第二解云從又但分別執為實有至名似現量此釋盡理者此意即約執心謂自識現得亦名似現亦者亦上意識諸似現量等自下大疏文也問何名非量耶答迷亂心於現不現前境錯亂分別取不實事心也於此有二類謂執心非量非執心非量也執心非量者緣非我法如執我也乃至非執心非量謂或於非黃生黃解或緣龜毛空華等也以據決定此通伏難若似現量在有分別無分別二心何故論文偏約有分別耶通曰論偏云有分別約決定似現量若無分別通現量故約決定者偏云有分別也若似因智至似比量入正理文大疏云似因及緣似因之智為先生後了似宗智名似比量如於霧等𡚶謂為烟邪證有火解云釋論於似所比諸有智生不能正解名似比量文具文云如於霧等𡚶謂為烟言於似所比邪證有火於中智起言有智生是真之流而非真故名似比量真指正比量也謂似比量具遠因近因智果三真比量類本邪智故非真比量故云非真相等四分四分義私記云問何故名四分耶分量決云心用分限四種差別故名四分若細分別應有四分護法菩薩依厚嚴經集量論建立四分廣說如四分義私記相謂相狀也私記曰問若言相分者云相狀之義者心法無相狀云何為相分體耶答心法雖無粗相狀而有細相狀故為相分縱緣於心至不能緣故私記曰問第六識見分緣心法時之影像可是能緣何云初唯所緣耶文舉此問次引此縱緣於心等大疏文答也疏文意云雖緣心法其影像是非能緣相分心不能緣慮故問若爾者所緣心不能緣慮者自證分所緣見分不能緣慮耶答疏通此難云此義不然自證分緣見分是一體之上義用故不作相分雖所緣心能緣慮今見分所緣心他人之心若我前後心是別體法故作相分緣其相分心非緣慮故不可例也帶我法之相狀演祕云帶有二義一帶者挾帶親附之義能緣親附所緣之境而不相離名為挾帶而猶世言身佩釰二帶者似也能緣有似本質之相相即相分心質相離名為帶似亦若世言靣帶火也見謂見照也私記云問見照者何義耶答了別之義也故論云此了別用見分所攝已上意云八識見分各了別所緣境有明了用故謂了別為見照又云見故名見照故名見耶答照故名見不謂見故名見問若爾見故名見者有何過耶答若見故名見者耳識見分亦可名聞分有此過故不名見故見照故名見自證分四分義私記云見分體用非他故名自此第三分證彼見分故問云見分體非他意如何答見分是第三分緣外之用體即第三分非他物故名之為自此第三分證知自緣外之用故云自證分也第二分唯緣第一等四分義私記文也次下云問何故第四分唯緣第三分不緣第二分耶答論云以無用故云云問無用意何答云此疏有二釋一云設許有緣有涉重緣過以無用故初釋或無緣彼之用不說緣之如自證分不緣於相能緣各有分限可緣故後釋問初釋意何答意云證自證分設緣見分有涉重緣過意云四分必緣前分非超越緣若第四分緣第二分者有涉見分緣過又自證分既緣見分證自證分又緣見分有重緣過涉緣重緣無益故不緣也問後釋意何答四分皆能緣所緣有分限故證自證分不可緣見分意云自證分緣第二第四用必定也第四分緣第三分用必定也分限有定量故更不可緣如見分是緣相分之用必定故不可證自證分緣見分耶所能量量果等又云量者量度義也心等量境名能量為心等被量之境為所量果者成滿因義也審察其所量能量云量果譬如以丈尺量絹之時絹為所量丈尺為能量解𢿘之人智為量果也問果是成滿因義意何答人以尺量絹本意欲知其𢿘多少是即因也既量計畢知其多少者成滿前因也是即果也心等量境亦如是能緣心緣境本意擬知境之青黃是因也既知其青黃了成滿前因也是即量果義也即以所緣第四為果又云何故不以能量為量果以所量為量果耶答𭂫量果必離能量有別體故已上問何以知以所量法還為量果耶答義演云例云如無色界本識見分緣種子之時即以自證分為所緣為其果何妨第三第四互以相緣後以為果問種子是在自證分處云何緣種子云緣自體分耶答義演云更無別種子相以種子持附自體分即以自證分為相分緣種子不離識故問第四分緣第三之時以所量為量果者且應第三緣第二時以所量見分為量果何故更立第四分耶答論云不應見分是第三果見分或時非量攝故已上問此文意何答不可以比非量之見分為現量之量果故不以見分為第三之量果後二分是體內法而一向現量故遞為量果也倫記曰問何故種子不在自證分等唯在見分耶義曰以相見及第四分於自證分上差別建立今以種子是所緣故故於見分上立自證分為能緣故不於上建立又依集量唯立三分故不在第四設立四分者以不離自證分故但是第三分差別立前二是外後二是內問何故前二名外耶答云此各有二義相分是外本質之影像故云外亦似外故云外見分緣外相分故云外亦似外故云外問見分內心法何故云外耶答疏云但由見分似外緣外故名為外非體是外問何故後二分名內耶云後二分是內心法亦緣心法故名內也凡後二分名內有二義一體內二緣內也問自證分緣外見分隨所緣名外耶答見分體雖非外依緣外名外自證分雖緣見分外外相遠故不名外也初唯所緣等解云見分緣相分時相分所緣也見分能緣也自證分緣見分時見分所緣也後二分互以成能緣故後三通二第二分通現等三量問見分通三量者八識見分一向皆爾耶答不然五八識見分一向現量第七識見分一向非量唯第六識見分通三量問後二分現量者其現量義何答西明云具三義者現量所攝問三義何答一非顛倒二非猶預三非重緣自證於境雖是邪見親證自體故不作邪正等解故自共二相解云於心心所所緣境有自共二相此有多類謂名句所詮自共相佛地經所說自共相因明所說自共相也因明所說乃現比量所緣也倫記云略辨有三一且如色薀中十一種異名為自相同有變壞等三義即是共相二五薀各別名為自相同有聚積總略義故名為共相三色等五薀性相各異名為自相無常苦空無我理同名為共相演祕云問經中二相其義云何答五薀等體名為自相薀上無常苦無我等名為共相雖一一薀無常等別彼此相似以立共名不說散心分別安立名共相也三惠章云此有多種略說有三一處自相色聲等法名為自相色薀無常等皆為共相二事自相青黃等法名為自相色聲所等名為共相三自相自相不可言性名為自相餘可言等名為共相諸法自體唯局法體疏曰如色法等礙為自性火以暖為性水以濕為性但可證知言說不及且如火以暖為自相此暖唯局火法體不通聲等言說不及何者言說若著自相者說火之時火應燒口火以燒物為自相故緣亦如是緣火之時火應燒心今不燒心及不燒口明緣及說俱得共相證智證自相法體智云證智故因明疏云若諸現現量所緣自相即不帶名言證法體疏云此之自相證量所知非言說等境故通在諸法等斷障章云彼說一切法上實義皆名自相以諸法上自相共相各附己體不共他若分別心立一種類能詮所詮通在諸法如縷貫華名為共相如是展轉疏全文云至不可說為自相可說極微等為共相故以理推無自相體且說不可言法體名自相可說為共相以理而論共既非共自亦非自為互遮故但各別說三種分別了義燈云此三種分別有遍不遍行相約遍行相自性分別通八識有計度分別通六七識尋伺為體第七識無恆審思量虗𡚶計度第七識有不爾執我是何分別體非尋伺而依思慧立此分別約不遍行相唯在第六云云有云於分別有粗細若以心心所緣慮自性名分別者此分別或名自性分別或可名任運分別則通八識及三量皆可具此分別若執心俱堅猛分別名計度分別此分別唯限六七二識非量心也若尋伺相應諸分別尋求伺察行相尤粗顯唯限第六識不有餘識尋伺唯第六相應心所故也自性此有持業依主二釋初持業者有漏心心所因循取境異無漏故名為分別是心心所本自性故名為自性自性即分別依主自性言亦通境說雜集論云如所緣相無異分別於自境界任運轉故即自性之分別名自性分別自性謂於現在所受諸行自相行分別此依主釋意也唯識第五攝論第一許五識有者是也燈曰問既約自性八識皆有任運分別七八何無答約二乘通不說七八文唯識論第五文也難卒解也云意識應辨隨念計度二分別故文問論不說言五識中有自性分別但言破於他意識應無隨念計度二種答論雖不明言五識有破但言應如五識第六亦無隨念計度不敢言無自性分別知有自性也隨念隨逐明記不𡚶念心所起分別故云隨念雜集第二曰初依現境自相而緣次緣過去後通三世於所緣境異相分別諸識所依問何名所依乎答八識各以依苻依住所名所依俱有所依俱有言蕳等無間緣等無間依前法為所依後生法為能依是能依所依異時有俱有依能依所依同時有也定有四種道論曰五識俱有所依定有四種謂五色根六七八識隨闕一種必不轉故同境分別染淨根本所依別故疏云望彼五識並有力故具前四義於此四中若隨闕一種五識必不轉故此四何別五根與五識為同境依共取現境故餘則不定獨得此名第六意識與前五識為分別依與依同緣分別境故五雖無分別意是分別為分別依染淨依疏曰第七與五識為染淨依五識由此根本染故成有漏根本淨故成無漏全成淨已不漏五識名根本淨其第八識與前五識為根本依由此識染汙謂雖第七初地分得今約佛果極解脫道前五識唯至佛果轉故根本依論第七云根本識者阿陀那識染淨諸識生根本故多引六此文疏依釋因果相順義文也七與力故下有所以二字依之文謂多引六起染執等由第七故者明因相順六緣境時七與力故者明果相順相順者多引意識起染汙執等由第七識故云相順非七緣境第六與力此二句明雖七於因果俱與六力非六與七力諸識生緣即是第七俱有所依解云此二句明第七無根本依所由謂以根本依第八為俱有所依不可別立根本依而第八識自體而已此二句明第八不立根本依所由謂根本依第八即第八自體也雖種子恆等全文云但由五識內詫本識即種子也外藉衆緣方得現行以雖種子恆外緣合有頓漸起五或四三二一識生故或五至一生不定故乃至若於爾時有一眼識生緣現前即於此時一眼識轉乃至五緣頓現在前即於爾時五識身轉等故五識由緣具不具故生有多少或俱不俱或俱不俱解云緣各合則五識俱起各緣不合則五識不俱起也故論云或俱或不俱起外緣合者有頓漸故第六意識至有時不起疏曰雖亦粗動者顯不定義謂亦五識又顯自識行兼有細以粗亦細也又顯與第七八識行相異彼微細沉審故又所藉緣少易辨故無時不具若爾何故不一切時如第七八相續生耶答由違緣故有時不起何者是違緣即下五位或猒於心或異緣礙遮識生起故名違緣極睡眠極悶絶論云無心睡眠與悶絶者謂有極重睡眠悶絶令前六識皆不現行疲極等緣所引身位違前六識故名極重睡眠乃至風熱等緣所引身位亦違六識故名極重悶絶極睡眠疏曰問此既無心所眠何名為眠而此中及大論無心地等說為眠也此有二解一由二似雖此眠時無彼心所眠體而由彼加行眠引或沉重不自在似有彼眠心所時以二義故假說無心身之分位名眠實非眠也第七八識疏云第七八識行相恆內緣一類沉審起藉緣少一切時有以行相細故無緣礙令總不行總不行之言謂第七識無漏定違染一分不行非體總無又但可令轉變非總不行故與前別以第六識粗動故亦為緣礙無漏定疏云瑜伽十二說或依非想非非想而入此定或依盡相而入此定何以唯依非想者次第定中最居後故以此定猒心至微微心方入餘下地心粗不能作此行相故依非想文此約初修人故次上云初修依何地起初必依有頂遊觀無漏為加行入初修即二乘及七地以前等又云前言初修唯依非想後修如何若得此定已自在者餘下七地心後亦得現前文論七云雖屬有頂而無漏攝疏云以無漏引體即無漏種故第六十二說盡等至當言無漏由與煩惱不相應故非相應故無所緣故非煩惱生故是出世間異生不能行故有䨱無記論云法有四種謂善不善有䨱無記無䨱無記論云䨱謂染法障聖道故述曰何名無䨱䨱謂䨱障體即染法䨱義如何障聖道故論又能發心令不淨故述曰合以二義解其䨱字即䨱者䨱蔽也蔽心令不淨故名為䨱蔽心令不淨解云令𭇥能令所令義謂染汙法能令同時現行法所令也其義易知不善性疏曰不善三者一感非愛果不善謂極惡法二性非巧便不善謂染汙法三性不安隱不善謂有漏法問諸不善性等解云已下義燈第四取意燈云問染法障聖道說名為有䨱不善亦障聖同名為有䨱答據能障聖道不善應名䨱招果㔟用強故不名有䨱問不善招報強從勝不名䨱無想不感果障聖名有䨱答自性染法䨱蔽勝障聖名有䨱無想報等翳理微故不名有䨱無覆無記異熟習氣解云善惡業種子名異熟習氣也倫記曰習氣通二種所謂現行及種子此中約種子名習氣有云第六相應思心所造作善惡業熏自思種此種子業𫝑力強勝故能有𦔳他無記劣種之力而彼𮊵劣無記法親因緣種子其力𮊵劣故無自生現行之力故䝉彼業種㔟力生自無記現行故此無記現行正親因緣種雖無記種子力劣故隱不論談勝𦔳緣業種名無記果能生因此思心所依身語意三為作善惡事熏自思種此思種有二㓛能一生自思心所現行㓛能二𦔳他𮊵劣無記種子令生現行㓛能也生自現行㓛能是名言種子不名業種子與現行思心所親因緣習氣性故𦔳他㓛能名業種不名名言種望他果非親因緣故也文能引異熟無記果習氣故名異熟習氣酬引業力解云異熟習氣感總報無記第八其異熟習氣有強弱不同酬其強弱𫝑力第八相續有長短不同也引業者疏云唯第八識是總果故是果之主餘果方生主引生故由強勝業引總果故餘別弱業方能生果據其勝業名引引餘業生故有云言引業引果者此有業業相對果果相對二義總報業引別報業總報果引別報果故非總報業果相對名也有義引起總報果體故名引業若爾滿業亦名引業引起別報果故此義違疏文恆相續故立異熟名疏云果無間故說恆相續由恆相續及是引果立異熟名感前六識酬滿業者從異熟起名異熟生不名異𤏅有間斷故倫記云三性種子同所依識說為異𤏅從此種子生現行時名異𤏅生疏述曰顯異𤏅因所生未盡即明亦感前之六識俱增上緣此是別果故業名滿引如作摸滿如填綵以此六識從第八識真異𤏅起名異𤏅生以非是主有間斷故不名真異𤏅成圓果事具足果事名之為滿亦通因果皆有滿義業勝名滿即前異𤏅等倫云釋其名因是善惡果是無記異因而𤏅故名異𤏅從義得名疏云別從總稱二種俱名為異𤏅果即由如前所說理故其第七識非異𤏅種之所引生因位唯染果無漏故樞要云真異𤏅具三義一業果二不斷三遍三界從自前念及種起故此二句明第八名異𤏅生所由對前念現行後念現行名異𤏅生是現現相望也從自異𤏅無記種生現行第八名異𤏅生是種現相望也有間不遍疏云六識不遍無色無心定等五識及意無故雖異𤏅起等解云三性法不名真異𤏅其義可爾而可名異𤏅生并從真異𤏅起故答不然對法第五說若法是異𤏅從異𤏅起者名異熟生善等唯從彼起不是異故不名異生問何故名果以為異熟耶倫記云謂阿賴耶一起酬因始終恆起遍通三界得名異𤏅廣如倫記威儀路心倫記云威儀謂表色路體即四塵四塵是彼所依故說威儀路又解威儀四塵為性路即發彼心與彼為依說心為路工巧處亦爾但是五塵四塵別故此中威儀多於道路施設工巧多於處所施設故一名處一名路為引導他或為利益倫記云為嬉𭟼加行所攝變化是無記其為利他起變化是善也令引一切有情至善道云引導一切有情得順益事云利益四無記種此一假義燈第三取意文此有二解等同學鈔云初釋意除變化心餘三無記有同別種若異心緣威儀工巧名二無記是因種生也若自能熏與異熟心別種也以同種生名世俗有依別種邊自在成就攝也後釋意三無記定別種也異𤏅生心他善惡心熏此種子緣威儀心熏名威儀種子緣工巧心熏名工巧種子不爾之時異熟心種熏名異熟種子故雖緣威儀等亦是別種也發威儀等別種之義同先釋也緣威儀等非實威儀等故名世俗有瑜伽中說名世俗五十五云於異𤏅薀及加行別皆世俗有文無實體用名世俗有離異𤏅無記心種別無威儀工巧種實體用故說為世俗有倫記云於異𤏅四薀中假立異𤏅生義名世俗有除異𤏅外於餘加行所生薀中假立威儀工巧變化名世俗有又云四無記心皆於遍行境上假施設故當知一切皆世俗有泰云賴耶四薀及相應薀是異𤏅故云於異𤏅所攝諸薀威儀工巧變化三法是方便心故加行三心於異𤏅生上而假施設故是假有以變化心不通異熟便非世俗解云變化心現在修四禪定依定得通依通起變化心故非業所感異熟無記種生故云不通異𤏅以故此有實體用非世俗不同威儀工巧異熟無記種生世俗有也若以自力熏成者解云以自力熏應串習無記心餘義應思但言世俗無唯言故疑云若自熏成威儀無記等各別有種子者瑜伽何云世俗耶通云瑜伽但言世俗不言四無記唯世俗故知自熏成威儀無記等一分非世俗各別有種雖是異𤏅燈云以是異熟由緣此等名威儀等故已上善等三性此一假疏五末取意文也能為此世他世順益故疏云謂一一法要令此他二世順益方名為善謂有漏善前世益今世益今世益後世益俱得樂果人天所仰無漏有為無為亦爾此世他世違越生死有得有證及由𣵀槃獲二世益非生惡趣等故并名為善人天樂果唯順益一世非二世故不名為善是無記果法故體非是善於後世中作衰損故不作此解違越生死此世他世違越生死自有順益義也故并名善有漏善二世俱得樂果人天所仰無漏有為二世俱違生死無為非二世俱生惡趣皆有兩世順益相故有漏善無漏善并名善人天樂果疏曰有問言若順益名善人天樂果亦現益故應名為善為答此問故說彼非問具修六度至二世亦成矣演祕四末文應撿善等界繫生得善演祕四引雜集論云由先串習生便即起不假思惟方便善又云親近善友思惟方起色繫除工巧色界無刻鏤等義故無身工巧二禪以上無尋伺故無語工巧也言語由尋伺起無色繫除變化變化依定通變化五塵境故無之也欲界有變化心倫記景云此中欲界變化唯是生得通三性心皆能變化不同毗曇欲界有修果心似欲界故欲界有情修上界定得通變化五塵境以欲依身變化故似欲界有之諸識三性答異熟性故疏云答有三初總答次別答後釋無記名此總答也若善惡性必非異𤏅文第八善惡業所感者若唯善性非惡業所感若唯惡性非善業所感既為善惡所感無記明異𤏅若是善染汙疏云別有三釋此為一因證唯無記攝論第三末自解善趣既是善應不生不善恆生善故即無流轉由集故生死流由苦故生死轉惡趣翻亦然既恆生惡應無還由道故還由故又此識是染依述曰此識既是果報之主為善染法之所依止既恆善應不為惡依是惡亦應不為善依互相違故何得與二俱作所依又此識是所熏性故等疏云如前已說唯無記性可受熏習此意相應等疏云今以相應顯心是染性非染故任運轉故同學云眼等五識任運也相應惑可唯無記今任運者一類任運也五識雖任運易脫起故通三性也五識雖具任運一義不具餘三義故非唯無記不障善故同學云不障善者不障有漏六位中善位十一云也第七若不善性者豈不障六識中善位耶不云不障無漏聖道遍三性故又云第七諸識染淨依也其性若不善者能依六識豈善性耶相違異性不可成能所依故也六位心所解云唯識論及百法論建立六位五十一心所瑜伽論建立五位五十一心所心所舊云心𢿘瑜伽論名有所緣或云有所依疏曰略以三義解心所總名一恆依心起心若無心所不生要心為依方得生故二與心相應彼五說與心相應故不與心相應又時依緣事四義具故說名相應由此色等亦非心所既爾心具五義與五相應應名心所三繫屬於心以心為主所繫屬之心有自在非所以是義故繫屬於心有此三義故名心所遍行五者對法疏云遍謂周遍行者起義周遍心起立遍行名亦遍亦行名為遍行一作意謂警心為性倫記云然唯識說作意能取事之總相及餘心所所取別相既總取境名心取別名心所問作意警覺用現行耶種子位耶答以種子警覺為正義義燈云為種位警為現行位答淮諸師說通二位警本疏種位非在現行西明要集俱非本釋云論二說通於種現同學云問種子是微細沉隱法也如何起警覺用哉答設雖沉隱何不施用哉煩惱種子發業潤生猒心種子起遮防用修無想定時熏成極猒種子此種子有五百大劫不生心心所㓛能也思種子防三業非等是其類也問觸等心所在現在位而施作用作意何異之哉答既異餘心所獨取衆多別相又何妨異餘心所在種子位起警覺用焉為性為業義燈云問同舉作用以顯性業二用何別答有云親用顯性踈用顯業又有云譬如火以暖為性用親火體用故名性用燒物用名業用望火自性暖性上所帶用與火性踈遠故觸謂三和唯識裏書云此中大乘觸別有體非即三和經部師三和成觸觸即三和是假文既大乘唯識立三和生觸三和外別體觸若云觸謂三和與經部三和成觸何異耶答大乘許別體觸故非三和即觸但云觸謂三和觸與三和同時互為因果故云觸謂三和非三和即觸倫記云基云此中觸為何業謂受想思所依為業如餘處對法等唯是受依何不云想思等此彼別者此據通論皆依於觸觸次作意後生故若據相隨轉而唯受分別變異解云於三和合位㓛能乃生既與前殊說名變異分別者即是領似異名如子似父名分別父疏云此意總顯根等三法有能順起心所㓛能名為變異此觸亦有順生心所㓛能作用領似彼三是故名為分別變易文論云和合一切心及心所令同觸境是觸自性既似順起心所㓛能故以受等所依為業謂根境識更相隨順故名三和疏云正三和體謂根境識體異名三不相乖返更相交涉名為隨順如識不生根境或起名為乖返又如耳根眼識香境三法乖返不名三和若相順者三必俱生既不相違故名隨順根可為依境可為取識二所生可依於根而取於境如此交涉名三和體觸依彼生等疏云即由二義觸名三和一依彼生彼即根等是觸之因依三和故亦名三和故聖教云三和生觸對法亦云依三和合二令彼合彼亦根等即觸之果謂觸能令根等三法合為依取所生了別此三和合由觸故然故說觸能和合三法由此二義觸名三和非一觸體可名三故從觸之因所和果說觸為彼三和合也三和合位至說名變異疏云謂根境識三和合位除未合時故言和位此三之上皆有順生一切心所㓛能作用名為變異謂此三法居種子時及未合前皆無順生心所作用於三合位㓛能乃生既與前殊說名變異變異即是三體上用正解變異體即三法受謂領納順違俱非境相為性瑜伽云受為何業謂愛生所待為業倫解云謂境界等愛皆由受後方生能起合離非二欲故疏云解起愛為業謂於樂受未得希合已得復有不乖離欲於苦未得有不合欲已得之中有乖離欲欲者欣求即通三性此業可通有漏無漏今唯依無明觸所生受說此唯是愛依染分說如緣起中受緣愛故有漏受能為愛之緣故想謂於境取像為性瑜伽云想為何業謂於所緣令心彩畫言說為業疏云體性可知言𭤸設者安立之異名建立發起者亦名𭤸設明詮道收發起義也名言為業次下論云謂要安立境分齊相方能隨起種種名言文此中安立以下釋此論文疏文也謂此中安立取像異名今文疏全文也次下云此業但是意俱之想餘識俱想不起名故設踈起名無失者第八識想如何起名由此故知此業不遍義燈云問想既設名言為業何非語因答淮雜集論說為隨說因非語加行由想境像方立名言此𫝑用踈尋伺用親正起語故說為語行思謂令心造作為性疏無釋演祕云問性業何別答性但令作業伇令作單重廣略行相有異同學云單廣立性重略為業謂不具驅役曰單今解云性不具驅役造作故云單業加伇心故云重也性總不顯三性廣談造作故云廣業別別分取分位善性時驅入善性造作即其時令心善作一分為業故云略也善等之因等疏三未文也全文云瑜伽論第三卷說即此邪正俱相違行因相由思了別謂邪正行即身諸業此行之因即善惡境由了此境相故思作諸業起善惡等事有尋等三地演祕曰按彼論云此中欲界及色界初靜慮除靜慮中間若定若生名有尋有伺地即靜慮中間若定若生名無尋唯伺地隨一有情由修此故得為大梵從第二靜慮餘有色界及無色界全名無尋無伺地文無尋無伺等諸師異釋如倫記第二上說有說大梵名中間禪尋伺中間故也別境五者對法疏云所緣事境多不同故能有別境立別境名欲謂於所樂境希望為性疏云所樂者謂欲觀境不但求彼若合若離但欲行意隨何識欲觀等者皆有欲生唯前六識或唯第六七八因中無作意欲觀任運起故七八二識全及六識異𤏅心等一分但隨因境𫝑力任運緣者全無欲起餘皆欲生勤依為業對法疏述曰此說善業生正勤故問勤即精進善十一一𢿘也故唯善性然欲通三性何云唯善性所依對法第十等皆云信為欲依欲為精進依即入佛法次第依然既通三性即唯善欲為依若不欲觀有云以下顯七八全分六識少分無欲次上疏文思淮可知二勝解對法疏云決定事者顯此所緣不定境等不生故印持為性又云印謂印可是事必爾持謂決了不猶預故謂邪正等疏云此勝解由邪教邪理邪證等力或正教等力或非邪正教理證力於所取境審決印持此事如是非如是以生勝解或教者教示或是言說但由轉習理者有此道理非謂四諦真實理也即攝一切事及真理謂此木是木之理等證者即修禪定或諸識現量等心能審決者皆有勝解由此道理生印可故更有異緣不能引轉令此心中更生疑惑三念瑜伽云念謂於久所思所作所說記憶為業疏云四法迹念是定因倫云四法迹者如對法說無貪無瞋念之與定彼為三學所依法迹無貪無瞋為戒所依念與定為依定與慧為依𢿘憶持曾所受境對法疏云此顯法迹三學之依故能生定於曾未受體類境中設曾所受不能明記亦無念起疏云重釋業用令心明記此生定者由多增故定專注故即唯善念生正定故若散心念非必生定疏云能生智有此多分言或淨分說非謂一切即如定後起癡心故謂觀德失至決擇智生疏云心專一境依教而緣證解所緣心便明淨由斯遂有無漏智生能知所緣德失等相約四法迹定能生智非定須然不爾見道至應無等持疏云其相見道為十六心觀境應無等持以要前後唯緣一境故彼一一念皆注其心於一境轉深取所緣故有定惠謂於至斷疑為業疏云此說勝惠故言斷疑疑心俱時亦有惠故謂觀德失以下釋業義對法疏述曰謂觀德失俱非境中由慧推求得決定故於非觀境愚昧心中無蕳擇故惠便不起多分不同唯識義章私記云欲勝解念各轉別別境定轉惠境是少分也善十一解云此十一有隨一起皆同時起但如欲界非定地故無輕安信謂於實至為性疏云實德能三是信依所是境第七深忍樂欲是信因果心淨為性正顯自體有云問忍樂欲者一向信因果信處都為無此相耶為信心所行相有此義耶答有此義但信行相處都無忍樂相唯信心所行相難顯故約因果談信依處者裏書云實德能是信依處是境第七又云此三為境方生對治不信樂善為業疏云此明業用顯揚說有五業然治不信初與此同此言樂善即彼四種能得菩提資糧滿故利益自他故趣善道增長信一信實有等疏云謂於一切法若事若理信忍皆是對法云於實有體起忍可信對法疏云成唯識說信別有三一信實有謂於諸法實事理中深信忍故即此論說有體忍可若諦非諦諸法之中皆信忍可名信有體此言意顯設信空無亦生信故非唯緣有始方有信舉信忍因顯信自體故名忍可二信有德謂於三寶真淨德中深信樂故即此論說有德清淨若德若非德令心清淨皆有信生不唯有德始方有信不爾若信外道無德信應不起唯識說此深信樂故亦舉欲界顯信自性今以信體於德境生故言清淨亦不相違三信有能謂於諸善深信有力能得能成起希望故即此論說有能希望有能無能希望修斷皆有信生非要有能方有信起不爾信諸惡是可斷法應信不生舉信欲果顯信自性故言希望由斯對治至世出世善疏云正治不信彼實事等能起愛樂於無為證有為善修故是信業等此性澄清至立心淨名疏云此信體澄清能淨心等餘心心所法但相應善此等十一是自性善彼相應故體非善非不善由此信等俱故心等方善故此淨信能淨心等依依士釋又慙等十法體性雖善體非淨相此淨為相故名為信唯信能淨餘皆所淨故勇悍為性對法疏云彼善惡品勤所對境此言心勇即勤之果各據一義理不相違疏云勇而無惰自䇿發也悍而無懼耐勞倦滿善疏云通三乘究竟果位或作善事圓了名滿能滿善故非要聖果勇表勝進至蕳淨無記疏云若唯言勤三性之法俱可勤苦然此中言何性所攝文通此問疏云勇表念念高勝非如染法設雖增長望諸善品皆名為退亦不名進無益進故進謂進成聖者身故悍表精純蕳四無記無覆淨也彼雖加行作意修習而非精純不應正理故不名精依自法力疏云於自身生自尊愛增上於法生賞重增上二種力故崇賢重善羞耻過惡謂作是意言義如是身乃作諸惡彼法甚好須依用之崇重賢善疏云於有賢德者若凡若聖而生崇敬於一切有漏無漏善法而生崇重依世間力疏云為世人所訶自猒於惡染已二增上力三有對法疏云有謂三有即三界果具謂資具即三有因緣生三有皆名有具染緣無漏亦有具攝作善為業有義問善者不過三善根今具修三善根耶答非具修於五欲境生猒離心為無貪正善今修此一善云作善耳於苦苦具述曰有情苦者三界行苦或苦懷苦唯舉有情顯勝瞋諸增道亦生瞋故不爾無瞋翻成境便言苦具者謂三苦因緣無為等有無瞋故或無貪瞋言有等者待有等立非要緣彼如前慙愧觀善惡立不爾此二應不遍善疏云貪通三界發業潤生總說有有具瞋唯欲界發業力勝故云於苦苦具七無癡倫記云若依對法第一卷云無癡者所謂生得聞思修慧決擇為體惡心不許為業對治惛沉疏云此正對治惛沉一法然對法說除一切障乃至彼約通障此約別障以惛沉是無堪任性安是堪任故唯除彼離重重謂粗重即種子令身粗重故須除也不放逸對法疏述曰正勤等四不放逸所依善根䇿發修斷勝故修善防惡顯此㓛能此說通業非別有體用等疏云此非別有體離彼四法無異相故體性無別無別用故作用不殊雙成無別體用也疏云問信等十法皆有防惡修善之能何故唯於四法立也其餘六法而方彼四𫝑用微而且劣故何謂為劣此四法中三法為根精進遍䇿一切能斷能修善心彼餘六法非根及遍䇿故非不放逸之依即非勝也行捨謂精進等論云謂即四法令心遠離掉舉等障靜住名捨對治掉舉疏云此間據別障掉舉等取餘法不同乃至對法第一明通能治一切法也離沉沒等述曰此即別釋沉沒等者釋前所治雜染相違由捨平等離沉掉故最初證得心平等性唯識說業對除掉舉由捨寂靜行正別治此說通障故言離沉然所等中亦兼掉舉惛沉掉舉通障捨故遠離加行次心正直又云心其障已除不由勉勵但順前轉無高無下故心正直無㓛用又云善心相續不盧染生任運恆時住無㓛用疏云加行者作意加行乃名分別離作意分別故其心正直若夫無瞋等疏云理實無瞋體是實有不害依無瞋一分苦之義勝故假立不害為顯慈悲二相別故此通難文也文云問何不於無貪等上建立答為顯㓛德中慈悲二相別故依無瞋假立不依無貪等利樂有情彼二勝故此文亦通難全文云問諸㓛德等如勝處等亦以無貪為性何以善中不依無貪之上為顯㓛德別故別立一假法也答一切㓛德依聖人勝於聖人身佛為最勝佛身中利樂有情勝利樂之中慈悲二種最勝為顯極勝㓛德別故依無瞋立不害非無貪等貪謂於有有具疏云於有者謂後有即唯異𤏅三有果也有具者即中有並煩惱業及器世等也有具故取薀生故對法論一云何故名取薀以取合故答為取薀何等為取謂諸薀中所有欲貪何故說名為取謂於未來現在諸薀能引不捨故希望未來染著現在欲貪名取瞋謂於苦苦具對法疏曰於有情苦及苦具者此顯瞋境有情自體三苦故苦生彼事理瞋名苦具令心憎恚是瞋體性五十五說於十境轉五十八說瞋有四損己他見他有情所所愛不饒非愛饒益初二緣害自身次一憎親友後一愛𭜨家緣此三境而起三瞋三世各三名九惱害不安惡行此說通障別障無瞋倫記解五十八文云瞋恚四種者謂損己他見為第一損己他有情為第二憎我善友為第三愛我𭜨家為第四此舉四境取四恚也不安論云不安者不安靜也令身心熱惱令五根身熱令同時現行心心所惱此乃不安也慢倫記云謂下中上於下謂下於等謂等直名為慢於等謂勝於勝謂等名為過慢婆沙等論但言於等謂勝不言於勝謂等諸師以此為妨理必須有於上謂勝名過過慢於多勝謂小劣於彼名不如慢若有慢等疏云於勝德法及有德者心不謙下故受衆苦疑謂於諸諦理猶預為性倫記云疑中猶預二分等者謂於有無二分心不決了略有五相等者此有兩一釋初疑過未世二疑因用三疑因所生果四疑四諦五疑三寶泰基同云一疑無他世體二疑無業三疑無因果四疑無諦五疑三寶猶預者善不生故對法疏云由疑不決不能造業修諸善品故善不生此說通業別障不疑惡見多生苦故疏云此釋前業謂於欲界唯除俱生發招善處業是分別惑故我我所倫記云執我我所等者景云末那但計於我無別行解計於我所但計我時謂此之我是我家我義名為我我所一切見趣等疏云以此我見為所依本諸見得生故名一切見趣所依趣者況也或所歸處也對法疏述云一切見者六十二等趣謂所趣諸見糾紛皆趣我故此屬我見趣或況見趣況由執我故此屬諸見與彼為依是此作業五見作用通障正惠今舉別用不說通業二邊執見又述曰邊有二義一者邊側障中道故二邊鄙障勝行故即於彼隨等疏云謂由於前我見執我已隨此我見後執為斷常謂緣前所緣為境障非斷常說有因果處中行道諦及出離諦三邪見五十八說此有二種一增益謂餘四見二損減此謗因等名為損減倫云𪵬就僻執違理名邪見通五謂謗因果作用實事倫記云問準本地分文謗父母等名作用無妙行等名為因何故此中無妙行惡行名為用謗父母等名壞實事解云父母有二義一有持殖用二有可尊之義即真實事又云撥父母中母是所託緣父是種子緣謂無𭤸與無愛樂無祠祀倫云由三種意樂撥𭤸等者一由著財意樂言無二由見取取彼斷見邪見邪見為淨意樂故起邪見無愛養布施三執祠火天以為究竟意樂無自餘祠祀布𭤸所依薀解云見及見所依五取薀等見取之境諸見緣薀起故名所依薀最勝能得清淨疏云此於諸見即餘一切惡見及此所依五薀執為最勝能得𣵀槃清淨法鬪諍所依疏云由此各各互執為勝諸見等故一切外道鬪諍因斯而起有云以自所執為真實非他所執故此見為鬪諍所依五戒禁景云即彼取戒禁之見彼見所緣名為隨行此見亦取諸見然多緣戒禁名戒禁取戒禁何別或佛法所受名戒外道所受名禁或根本名戒方便名禁隨順諸見等疏云謂依諸見所受戒說此戒為勝順諸見戒及戒所依五薀眷屬執為勝及能得𣵀槃淨名戒取戒即禁也乃至一切外道受持髮等無利勤苦故忿五十八何緣忿說名母駝答似彼性故倫記基云忿如母駝母駝惡意鬱卓忿亦爾為示惡意於他也不饒益境疏云謂依現在可聞事或是有情或是他見即緣事生執杖疏云執杖者即是身惡表業杖謂器杖從麁猛多分說唯言執杖亦有惡言故熱惱為業疏云熱惱為業由恨故生惱非俱時也然忿亦生惱親對輕故但說恨生三惱至為業疏云追先忿恨之境觸現違緣心多佷戾者慠佷𢤱戾尤䖧惱螫於他人等多發囂暴等疏云對法顯揚第一五薀皆言發凶險鄙惡弊之言者以多發故由惱起時亦發身業故如忿亦發語但說執杖囂謂喧囂暴謂卒暴踈鄙謂鄙惡悔惱為業疏云對法云法爾覆罪者心心憂悔由此不得安穩而住誑謂至相用疏云矯謂不實之義詭詐虗僞之稱謂自無德詐僞有德貪利養故邪命為依障不諂教化論云矯設方便為取他意或藏己失不任師友正教誨謂於自盛事疏云於自盛事者顯揚云謂暫獲世間興盛等事心恃高舉乃至此中通言諸所知法亦名盛事染依為業論云憍醉者生長一切雜染法故殉自名利應為徇字讀為求也訪也唯識裏書殉辭峻切以人送死也非今意謬也不耐他榮疏云他榮者謂世間榮即富貴安樂出世之榮即是證說勝品㓛德通有無為無慚疏云此反慚相應準前說對法無慚自不耻為無慚無愧疏云準返善中愧為其相等心穢為性論云如極穢物自穢穢他是故說此心穢為性惰依為業論云不信者多懈怠故增染為業疏云增者是滋長義於諸善事等疏云非但於善不勤名怠於惡䇿勵亦是怠也於無記事而䇿勤有云於善品不進故不精進於善品不退故非懈怠但欲勝解也縱蕩為性疏云縱謂縱恣蕩謂蕩逸障輕安毗鉢舍那疏云此乃別障善中輕安通障觀品顯過失增說有二障惛沉別相等疏云謂瞢重是此別相瞢謂𧄼瞢即是惛義重謂沉重即是沉義此體別相非無堪任令俱生法無堪任故障行捨奢摩他疏云能障行捨善法相違障奢摩他止品對治若別善法相對行相違捨相若總善法相對行相違於止品以過失重說有障二對法顯揚皆言違於止品唯此論中違捨善掉舉別相等疏云此申正也謂囂掉舉動是此自性令其俱生心心所法不寂靜故散亂所依論云謂失念者心散亂故疏云由失念故生起散亂遂難解業不能明記善等事故名為失念毀犯為業疏云不正知多發業多發惡身語業而多犯戒等顯揚對法五薀皆同令心流蕩疏云流者馳流即是散㓛能義蕩者蕩逸即是亂㓛能義惡惠所依論云散亂者發惡惠故𮜒擾疏云𮜒者謂散擾者謂亂彼令易解等疏云掉舉舉於心境雖是一令俱生之心心所解𢿘轉易即一境多解也也散亂之㓛令心易緣別境即一心易他境也雖一剎那等疏云雖一念中解緣二法無俱易義而多念相續有易解緣義故一剎那中雖有此二行相難知故以相續顯其行相若唯一念隱故不說是煩惱等流性故疏云二十隨惑根本等流等流者同類所引義非前後等流也又云言等流者謂同類義𫝑非強勝然非因故不名根本今謂疏有二解一者隨惱於心二者隨煩惱生煩惱者本惑也隨本惑生疏後義為正忿等十各別起等疏云行相局故名之為小有云忿乃至慳十名小隨惑行相互相違必各別起不並起故也無慚等二等疏云自得俱生行通忿等唯遍不善位局後八掉舉等八等疏云自得俱生但染皆遍得俱生故不可名小染皆遍故不可名中二義既殊故八名大悔謂惡作疏云悔謂惡作者以體即因即諸論說惡作者是惡作非悔悔之體性追悔者是如人可知惡作之體以何為性惡者嫌也即嫌惡所作業諸所作業起心嫌惡已而追悔之方是悔性有云本名悔而果上立因名名惡作必先惡所作業後方追悔故也惡為因生悔也令不自在昧略為性疏云此令身不自在坐亦睡故乃至能他搖動亦不覺等故此令心極暗昧輕略為性有云睡眠心所行相𭝂故云輕略也一門轉故疏云唯一意識都無五識同學云問何故以識為門耶答意識既為睡眠心所之所依名門無失略別窹時疏云窹時廣故別謂蕳別也有無心位假立此名疏云世間聖教有於無心位亦名睡眠此假立如論說言無心睡眠此則是也由眠所引似起眠時故亦名眠有云問無心位睡眠心所亦無何名睡眠耶答無心位雖無心心所疲極緣未至極位眠心所相應令心昧略無心位所引起彼似彼故亦名睡眠也尋謂尋求倫記云尋謂尋求伺謂伺察或思或慧推求粗位名尋即此二種於境察審細位名伺非一剎那二法相應一類粗細前後異故忩遽疏云忩迫遽意以安不安等疏云身心若安徐緩為業身心不安忩遽為業但通思惠或思名安徐而細故思量性故惠名不安急而粗故蕳擇性故身心前後有安不安皆依尋伺故名所依今此境者通一切境意言境通一切有漏無漏色心三世等法意言倫記泰云名言能詮法意能分別法尋俱粗意亦能分別法分別法義似名言故名意言又解言是思惟言非是語言意興思性名言俱行故名意言基云名自言法名體是粗意尋能思諸法似於名言故言意言性也又言說名是言名思惟名意名尋是思惟名故故名意言也三從果等有云第三釋果者由意起言云果也並用思惠一分為體有解以遍行中思別境中慧推度發言用別立尋伺也此四心所於善染等以下解不定得名疏云於善染等皆不定者一解顯不定義此界性識等皆不定故王所相應唯緣境之總相等唯識義章私記云心王若緣青色時但總取青不更分別何物青心所於彼青色分別何物之青色故心王但取總相心所取總別相演祕云心王所取總別義總而為四釋一心唯取總心所唯別二心王唯取總相所取總別三王所俱取總別二相四心王取總別心所取別相然以第二義為正故今舉第二義也心王所屬故名心所對法疏云成唯識說恆依心起共與心相應繫屬於心故名心所如屬我物立我所名心於所緣唯取總相心所於彼亦取別相助成心事得心所名如𦘕師資作模填彩時謂剎那疏云時謂剎那定同一世依謂依根即俱有無間是也王所同所依成相應義也就其所依有俱有無間二依俱有依能依所依同時無間依能依所依前後雖有同時前後異心王心所同所依也蕳別識樞要云依蕳別識唯識義章私記云以依同蕳別識謂眼識與俱時意識緣一青色時所緣是一然眼識以眼根為所依第六以第七為所依所依各別不可云相應故云蕳別識緣謂所緣等疏云以所緣等蕳別見謂第六第八同以第七為所依根然第八識唯緣三種境第六識遍緣一切法所緣各別不可云相應故云蕳別見事謂體事又云以事蕳體多謂眼識與俱時第六共緣一青等之時眼識一聚心王心所各各體一故以相似名為相應若加俱時第六聚之心所名眼識之相應者有心王體一心所體多之失不可云相似故云簡體多印持決定疏云勝解印持曾為猶豫境今得決定事定能令心專注一境疏云定雖影像相分剎那新起其加行時所觀本質前後相續恆專注緣此識任運不作加行專注本質恆緣現在影像所緣但新新起善染汙等疏云等者等取餘善等法即不定四既通三性亦在其中惡作等四等此通伏難疏難云善染非異𤏅可說不相應不定中無記何非此識並文論以此惡作等文釋此難也有間斷故等疏云非一切時常相續故非此相應又云非異熟者非真異熟不遮異𤏅生亦有惡作等欲希望未遂合事等疏云欲緣從來未合事故此恆緣合境常是我故勝解印持等疏云勝解但能印前疑事不了事生此恆決定計我非餘非先有疑及曾未了今方印可故無勝解念唯記憶等又云念能憶昔曾所習事於現在習者已今起追憶非我已今生追憶境恆有故定唯繫心等疏云定唯別作意繫心專一境由加行心趣求一境唯緣本質一法不作別緣前後念解亦非常解此識任運不深趣求專緣一法剎那別緣故無定也善是淨故疏云其善十一體非染故非與此俱此俱唯染故見所斷修所斷疏云前見道者唯在初地初入地心今此修道除初地心出相見道已住出地心乃至第十地終金剛無間道來並名修道我所偏見依我見生等疏云我所及邊見依我見後生此識相應不依彼起任運緣內相續而生不假他後起故不起我所及遍見也睡眠必依身重昧等疏云睡眠若起必依身心沉重惛昧此是內緣外衆緣力即是病等或涼風等有時暫時如對法論第一說即是間斷非相續義乃至一類無始蕳別不假內緣而起慢於稱量門解云淩他慢也自他相待方勝劣故名為稱量自恃慢非稱量故苦等五受苦樂尤重疏云謂在五識即楚利逼切明利適悅名苦樂在意稍降逼切如可適悅名憂喜受無分別故具可云在五識逼迫適悅俱無分別名為苦樂諸識受俱若是餘受必有間斷苦樂間斷法非常恆相續苦非常恆相續樂故七有情恆執等論全文云由此識常無轉變有情恆執為內我故云云疏云常者相續義無轉者一類義我是一常故此似我顯第七識恆緣執我寧執為我若苦樂二受相應或時苦或時樂轉變無常故第七何執常住我雜受純受疏云鬼畜處通若唯苦處地獄相似五十七說與地獄同純受重故若雜受處容有喜樂況復無憂雜受輕故捺落迦中至為苦疏云捺落迦者此云苦器受罪處也那落迦者受彼苦者故二別也有云捺落迦此云受苦器那落迦此云受苦者無分別故疏云其諸地獄一向苦故唯苦無憂以迫尤重為苦所逼亦無分別以憂分別方得生若在欲界至悅心故疏云大乘初二近分有喜乃至何以無樂以彼適悅不遍五根故但遍意識及身處少分初二靜慮近分俱舍疏云四本靜慮四本無色各有近分與八根本為入門故悅身心故疏云根本初二名喜樂者適悅五根故安靜尤重無分別故疏云以安靜適悅故無分別適悅故名樂尤重故名樂即是在意名樂所以五果體相異熟果倫記云異熟果以一切業所招無記五蘊為體別報從總總名異熟若但言異熟等論釋異熟果云一者異熟謂有漏善及不善法所招自相續異熟生無記文今文釋此論文曰若但言異熟即六識中報非真異熟攝今為總攝彼故言異熟生倫云次釋其名因是善惡果是無記異因而熟故名異熟從義得名等流果又云等流果以一切有為漏無漏三性自類同品劣法前聚生後同品勝法後果為性相似之義假名等流倫云瑜伽唯識皆又說言或似先業後果隨轉如由殺生得短命此實增上假名等流命短同故又云一切有為前後相似名等流因等流為果名等流果即當體為名亦可共等流為果名等流果即從因為名離繫果倫云離繫果以斷煩惱障及得果所證擇真如為性斷所知障所得擇等但是增上果所斷障體非繫法故六行所得亦增上攝不斷種故又云擇無為體絶羈絆故名離繫離繫即果當體為名士用果又云士用果有二義一云五蘊假者作用所得四塵為性三十八云占卜稼穡為自性故二云通以一切有為無為為性別別諸法名士夫故此能招得俱生無間隔越不生四種果故又云五蘊和合假立士夫士夫作用所得之果名士用果此即從義作用為名士夫是義用是作用如夫農作等謂由農作因得稼穡果由商賈因得財利果由事王因得褒録果由書𦘕因得文字及形像由算因得記數果由占卜因得吉凶果增上果倫云增上果以一切有為無為為性性寬通故又云万法不障一一法有增上增上即果當體為名亦可用有得果之㓛名為增上增上為果名增上果從因受稱謂除前四有云除前四果外餘與力不障果皆名增上果也增上果有二廢立一別體增上果二雜亂體增上果也別體者以前四果外與力不障諸果為增上果四果外有別體故名別體雜亂體者前四果亦與果有與力不障義皆增上果也與餘果雜故名雜亂賴耶三相此曰藏疏云藏具三義如論已說義雖具三正取唯以執藏為名所藏義通第二位第二位從無始乃至佛果極解脫道第八也此間第八受熏故所藏義通第二位也問此識果相應通三位疏云問阿賴耶阿陀那名亦是果相獨言異熟有何意耶答異熟名等此識果相雖多位異熟名寬三位通二位五位通四位故偏以異熟為果相此識具四果疏云謂前望後為等流果同時心所望此心王名士用果種子生時亦名士用故論下言如俱有因得士用故亦名增上果異熟果可知答等流增上等此明以不共義異熟為果相不共者真異熟義不通餘法故如是三相等樞要云第八三相攝論第二卷以種為因相諸法因緣故現行為果相二種所生故現種俱為自相現種俱為自體故乃至第四說三相俱取現行及一切種與轉識互為因果故我法二執我法二執於五薀假和合法執為常住云我執於三科法體執為實有常住為法執執者誤實非常住謂常住云執不稱境故名為執也諸我執但言我見獨取薩迦耶見故體局心所言我執非我見總取我見相應心心所故其體通心心所故疏云言我執者顯非唯見心心所法皆名執故演祕云若言我見不通心王及餘心所執言寬故該見同時心心所等皆名為執恆與身俱疏云但身俱者解其俱義言而轉者解其生義不待邪教疏云邪教分別及邪思分別一分別言通二處也一常相續疏云常相續者顯恆起義在第七者顯執所依緣第八者顯所緣境起自心相者顯緣第八不親著執為實我者不稱境知故執生也二有間斷等疏云在第六識顯執所在五取蘊者彰此俱生我見之境不緣無漏乃至緣蘊總別顯執行相總緣五蘊為我名總別緣五蘊為我名別乃至此中所言五取蘊相或別者是第六本質起自心相者是影像相緣識所變有云識所變言可通諸識歟第六廣緣識體故諸識所變境為本質無不緣故識言可通諸識歟細故疏云無始串習體相微隱難斷疏十云非世道伏二非初道斷見道初道斷者即見道斷三非地未滿修道能斷要第九勝道方斷故言難斷勝生空觀疏云勝生空者蕳異有漏及遊觀生空心斷彼不能故又云言生空斷者一通三乘二以行相而說其實菩薩亦法空斷亦由現在外緣力故疏云內緣必藉兼藉外緣故外緣說於亦字非與身俱以來顯異俱生要待顯分別義一緣邪教所說蘊相疏云第一是即蘊計我二緣邪教所說我相疏云離蘊計我乃至或以名教而為本質起自心相粗故易斷疏云行相猛名為麁初聖道除名為易斷初見道時疏云違見道故道生便相見道中不斷之故論云初又真見中有無間解脫無間道斷異解脫名初生空真如有人問云上文明俱生伏斷時云勝生空觀今斷分別時亦云觀一切生空真空不云俱生分別俱以法觀斷有何意耶答實可通之故本疏唯言生空斷者一通三乘故二以行相而說其實菩薩亦以法空斷也今謂通三乘者生空三乘通觀故以行相者我執正違生空智故也緣識所變蘊處界相等疏云識既不能取心外法唯緣所變蘊界相等或總緣蘊或別緣蘊界處亦然此二法執至方能除又云第六識中俱生法執於其十地道𢿘𢿘修地地別斷以障地故第七識者於十地中道𢿘𢿘修要至金剛方能除斷此中合說若道若斷故言𢿘𢿘方能除斷此唯菩薩非二乘者若𢿘𢿘斷習種俱然又除有二一伏二斷六識伏亦斷第七伏不斷故皆言𢿘𢿘乃至言勝法空顯法空觀蕳遊觀心唯取無間斷法執道此亦二種至執實法又云此文可知即小乘等並名邪故不稱正理故二緣邪教至執為實法又云自性即是𢿘論勝性等取勝論實句義等如是非一乃至初小乘等所執後外道等所執煩惱所知薩迦耶見疏云此中不言我見言薩迦耶見者若言我見不攝我所乃至為顯此中攝我所故言薩迦耶見薩迦耶見而為上首疏云亦以法我我所執為首生餘障故文煩惱障下薩迦耶見人我見也故疏曰由我見為本生諸煩惱所知境無顛倒性疏云所知境者謂有為無為無顛倒性謂真如理由覆此境令智不生能障菩提故名所知障若論正障至依勝用說同學抄取意文也此中云聖教指唯識論第一彼云由斷續生煩惱障故證真解脫由斷礙解所知障得大菩提執我執法等以下明二障體一義示兼障所由疏云體不相違可唯一體用義分故可說有別同一種生用分成二如一識體取境用多故是一同一種生無違於理如一眼識緣青黃兩境二行相生我執必依法執而起解云法執體迷我執用迷故用迷必依體迷如要迷杌等疏云人我位必有法我人我必依法我起故人我是主宰作者等用故法我有自性勝用等故即法我通人我狹也如人要迷杌不知見杌等方執為人迷杌為先後方人起此中喻況理有淺深淺喻謂人是人執迷杌是法執等能持自體等以下通難疏云問云何故人執必帶法執法執亦有不帶人答能持自體等非一㓛法等以下明法執有不帶人執如計外境等唯識義章私記云如計外境唯起法執不起我執無常一用故知計外境唯有法無我即顯內法上唯起法執不起我執是故人執以下補特迦羅我見以下總結也能遍計識虗𡚶分別為自性故若有漏心有如無漏不起執者即楞伽中邊等不應言虗𡚶分別既言有漏心虗𡚶分別為自性明知有漏心皆能遍計疏九本應撿若計度惠等以下通正義難難云依計度分別故有二執然五八無計度分別何云有二執耶由七識熏習分別力故七識者除第七約起法執說故疏云依第八所變想無之上第六七識起執於我除第七識餘之七識起執法不計末那有法執故八識生時變似我法如是從無始來我法分別熏習力故諸識生時其諸識自體分轉變相見二分似起其二分似我法八識中皆有執計故有人云安惠云無似有安惠一分師不立相見二分故相見二分無似我法有也八識有執故有我法二執也第六第七等疏云若護法難陀等解由無始來第六七識橫計我法種種分別熏習力故若安惠解七識相應諸心心所名皆分別能熏習故即由分別熏習種生熏者擊發義習者𢿘𢿘義由𢿘熏發有此種故後諸識起變似我法八識生時變似我法疏云護法釋云識自證分所變相見依他二分非我非法無主宰故無作用故性難言故聖教名我法者是強目彼如世說火口不被燒所說火言明非目火世間凡夫依識所變相見二分依他性上執為我法此所變者似彼𡚶情名似我法彼𡚶所執我法實無非可說牛毛似彼龜毛故不說似彼但說似情有云護法云有似無文護法四分師故相見二分依他有法其有法似都無我法也疏云問前護法解後安惠解何故我法但依二分不許自體以為我法答云云依此難意二師並同許相見二分似我法也疏一本應撿而由六七等同學云五八識雖自無我法分別第六識屢執我法或在俱時互相增益或前後起緣發八識緣彼熏習或令自熏如此熏習染濁氣分展轉增長遍在一切何念有漏為𡚶不穢依之後時生起之相不清淨也故五八識見相分似六七識我法相見何必由自分別也有見相分似六七識我法相見非起二執名似我法撲揚解同此詳之
