body:
  text: 沙門高範撰次十一色法倫記云前言色色五識緣色體意識緣色法謂緣彼色上生住異是色家假四相法名為色法法處所攝色百法論疏曰法謂䡄持處謂處所十二處中處也法處實色法處色章云分別假實者下第六云極微無體由慧分拆顯揚第五云慧拆粗色至最細邊建立極微非由有體乃至唯識亦云至色邊際假立極微五十四等皆說因此故初二色皆是假有也唯識曰謂依思願善惡分限假立無表乃至受所引色亦是假有顯揚第十八說七事無實三影像四響音故遍計色亦是假有五十四說墮法處色有實有假若有威德定所行境如變化彼果彼境及彼相應識等境色是實物有乃至故定果色體是實有也倫記云墮法處色有二種若有威德定所行境猶變等者備景同云三乘聖人定心境界謂作八一切處觀當心而現此是實有為緣令他自見心變八相分如變化心起變化色與他為緣亦令他見自所變色定現色是定心果復是定所緣名境故言彼果彼境問變實境者為局菩薩為通二乘耶答本疏演祕略纂云通義燈及同學云局更應究尋極微為性唯識論云為執粗色有實體者佛說極微令其除拆非謂諸色實有極微諸瑜伽師以假想慧於粗色相漸次除拆至不可拆假說極微倫記云問大乘何故不計有最細極微集成根境設許集成有何過耶解云一切有情從業生眼擬有見用從業生耳擬有聞用餘根亦爾故彼眼等從業全生成其根用五塵亦爾必從先業全體而生成境界用最細極微不成根境又云若大乘中無實極微何故復教觀細極微答為破有情執實心故故教假拆從頭至足衆微集聚由作此觀於內外色起虗空假想順三脫門極略色演祕云拆根器等為極微者名為極略總略衆色景云此乃意識假想分拆諸色作極微解非大乘實有細極微體倫云於色聚中曾無極微生等者此顯頓變非漸積不同薩婆多聚中有極微又非極微集成色聚者極微無體不同經部積成大義合前二種不同勝論麁細俱實極微對法疏云梵云波羅摩阿拏此云極微微者少義色中至小立極微名從七波羅摩阿拏成一阿拏即從七極微方成一微義舊語音訛故名阿稱成極微者是邊際義成唯識亦言雖此極微猶有方分而不可拆若更拆之便似空現不名為色故極微是色邊際瑜伽論第三又云色聚有方分極微亦爾色聚有分非極微極微即是分故更無餘極微故顯揚第五第十六第十八文義並同故不煩引極逈色又云極逈色中言即此離餘礙觸色者即是此前所說極微即此極微離餘礙觸者名極逈色即此極微不離餘礙觸者名極略故或即此者一即此極逈色是離餘礙觸逈色之極微色故名極逈色由彼逈色離礙觸故彼礙觸物即名為餘謂明暗光影空一顯色等如上卷解不更勞引一切處中對法第八云非律儀非不律儀業者謂彼所有善不善業若布若歐繫等律儀不律儀所不攝業皆此所攝定道二戒婆娑云定共戒者發得初二三四禪時不作意持自然不犯戒與定共發此戒斷惑未盡未出生死是有漏戒道共戒者於見道修道位中不作意持自然不犯戒與道共發此初二三果所得即無漏戒轉不隨心俱舍業品頌疏曰唯定道二名心隨轉入定則有出定則無與定心俱名心隨轉別解脫戒非心隨轉異心無心亦恆轉故異心者惡無記也勝定力故疏曰若勝者唯第八地已去任運實變大地等得為金寶令有情用故境隨智轉所欲皆成又約得十自在十地皆得準此義得定自在即初地亦轉或第三地得定自在於一切色皆得自在同學云諸法體性本自雖定法體如幻地上大士證法性真理達依他如幻轉𢵫本質理無所疑但以能生種子其體殊別止土石現行生金等現行果從彼起果謂五塵境由定通因變起彼謂自在定能造大種地謂堅徑等解云地者非謂土地土地堅法故為顯彼堅義以堅性名地大種餘三亦爾以世間所見水火風即非為實能造之大種為顯濕等性名水火風等也能造大種與所造色俱時而有問若一大造者云何瑜伽羯剌藍時能造及身根眼等大俱時而有次第造耶若別大造何故說七物與眼同處乎同學云色蘊中眼幾物所攝答相離攝故唯有一物故今隨三藏解說一地大造也各別不立四大也根依者扶根內四大種所造色為依故地大堅法故為顯彼堅義以堅性名地大種餘三亦爾以世間所見水火風即非為實能造之大種為顯濕等性名水火風等也問世間所見水火風等何物答彼所造大種也非能造大種謂世間所見地等非唯堅性亦餘濕等性及色香味觸和合而成故彼四塵中三塵四大種所造也既四塵所成也故非能造微細大種名想聚中名謂作想解云想者取像或契約義若取像名想想是心所如說色名能生色想因名生想名為作意若契約義想即是名謂諸賢聖共為契約立色等名名即是想由此名想能有詮表故名作意五種因力倫記云如對法第一卷云即依五因說名為造生因者即起因謂離大種色不起故依因者即是轉因謂捨大種諸所造色無有㓛能據別處故又云依因中由造色生已不離大種處而轉者此說即質造同聚造實造非假造由諸月灮孤行香等離大種故生無色界定道戒色無四大故勢依彼皆有依因立因者即隨轉因由大變異能造色隨變異故持因者即是住因謂由大種諸所造色相似相續生持令不絶故養因者即是長因謂由大種養彼造色令增長故義燈曰四大能資色即說四大長養因變異因緣士夫用者倫記景云非人㓛用名士夫用四大出生名士夫用謂由地夫所拆觸故者如木石打著人身青赤色生由勝定者如修天眼耳根入初禪勝定勝定力故於先引起能造大種如是後時方乃修得天眼耳根所造之色二種造色自類差別自謂能造類謂同類差別謂有澀滑等別也法處一分五種中自在所生色瓶等假有下易解故不記不相離色大種造色章云此有三一同處二和雜三相雜又瑜伽第三說諸色處有二不相離一同處不相離二和雜不相離同處不相離者如一眼根阿拏色四大阿拏與造色阿拏隨應所有並相涉入合成一處無別處所即一阿拏色中有八阿拏加聲為九加身為十隨餘根十一或眼身地色香味觸七阿拏一因一果同在一處互相涉入非如薩婆多宗極微各別合成阿拏亦不同經部合成阿拏今者大乘本無極微如色等微至阿拏時隨其所應多少同在一處諸根於彼能遍受用以心知境故爾由境生心故然為同處不相離也和雜不相離者即前同處不相離阿拏色能造所造相涉入者雖在一處同處而住而不相入合為一體諸根得時各各別故然不可說如胡麻豆等聚可分拆得故名和雜不相離又解大造同類相望同一處住名同處不相離異類大造相望亦同在此一處住名和雜不相離非如他宗同類異類極微各別非同一處七各極微略纂云如一眼根所有七極微同處同時不相障礙如一眼根極微如蒲桃果大此中微細皆可容受餘之極微如是展轉乃至廣說於一聚中有彼七物若據實言之既無別極微體何故得有七物耶義曰以即如蒲桃果色是清淨色為眼用故名眼乃至為觸用故名觸皆可拆色極微故言一聚中有七極微非實極微而有七物此乃同處不相離也大種得名或種是類義也大種造色章曰謂種者因義或是類義也此四能為生等五因起衆色故因義種種別故類義體性寬廣於造色論云體寬廣故謂四大種遍所造色其體寬廣成壞世界謂如地能持世界火能壞初禪水能壞二禪風壞三禪雜集論云器世成壞相者謂水火風三種成壞由水火風災令大地等𢿘成壞故四大即種等大種造色章云由此地等亦大亦種故名大種持業釋也若言四大種四是𢿘名即帶𢿘釋共不共相解云共者共同義多人共同變亦共同受用故名共相不共相翻之應知且諸種子總有二種論種子有色心有漏無漏等別今但舉色法種故云且實非下論作實非自變他能用之若能用者此即名緣心外法故共不共中總分為四唯識義章私記曰問此四句意何答如山河等名共中共者上共言明共變義下共言者明共用義其山河等四趣有情同變山河等故云共四趣有情同共受用故亦云共合云共中共也如己田宅房衣等及鬼等所見猛火名共中不共若人類多少有情業同類輩共變田宅房衣等若鬼等多少之類其業同輩共變猛火等故望同業有情共變云共也然人類雖同變田宅等自己田宅他不能用他人田宅自不能用故云不共又猛火等同業鬼等雖同所變然人天等不能受用故云不共所以合言共中不共也如眼根等名不共中不共者唯自識變他人不變故云不共唯自識依用他人不依用故亦云不共所以合言不共中不共也如扶根塵名不共中共者眼等扶根自識所變非他所變故云不共然他亦有少分受用故云共也所以合言不共中共也乃至問就不共中共句扶根塵他亦變之故論云變似色根及根依處其依處者扶根也而何云不共答自扶根自變執受安危同故他人變非執受非安危同故故雖同變然名不共但有少分他受用義如手摩等故亦名共是不共中共也倫記云然共中有二謂共中共共中不共如一外器世界他共緣受用故名共中共如衣物等唯自所用他雖有用義名共然自受用業勝名共中不共不共中亦二謂不共中不共不共中共謂如自眼根他識不依唯自識依名不共中不共其扶根塵等自不共業招然亦他第八變即不共中共問如自身中眼識所變亦非意等所見者何況他人如何名共中共不共中共敘曰然以理唯無共者皆自第八所變他即不受用今據相似如眼唯自受用義他無用名不共中不共其外器世間雖自變者非他用然受用中有相似義謂言共用故名共業餘二句準此應釋共變不障譬如衆多燈明唯識義章私記云明共相境同在一處不相障礙引小乘義為喻也譬如一室中有百千燈別別放光遍一室內其光相相狀相似無異不互相障共照一室諸有情類各各第八所變器界雖無量種相狀相似所所無異不互相障總名一界一一自別衆多燈其光各別也燈明既多等解云以下明一一自別之義有二義其一問何知衆多燈其光各別答置多燈時人影亦多故知隨燈光亦各別也其二問如上答若有百燈共照一室若一燈餘光猶遍光若不別一燈時無有餘光匆可可成暗既不如是故知光別唯識義章三本可見不相應行瑜伽論記曰釋名具足應言非色不相應行言非色者即蕳於色不相應者復蕳於心心是相應以非心故名不相應行蕳無為無為之法亦非相應乃是有為故為行則從𢿘蕳別為名別名可知依諸有情等有解云諸有情身中由有可成法爾力或可成業力成就彼此色心法時以此法成就分位名得然薩婆多宗意所成色心外別有能成得法非色非心其體不相應實法也依此法力云令得色心法也衆同分疏云衆者種類義如婆羅門等同是一義同是一婆羅門故分者相似義同雖通能所今屬能同衆之同分依士釋也異生性疏云異生性者或五四蘊成有情法性唯染汙異生之性名異生性異有二義一別異名異謂聖唯生人天趣此通五趣故又變異名異此轉變為邪見等故生謂生類異聖人之生類名為異生謂有異生等疏曰異生性者一顯得大聖猒之故遍淨者謂第三禪天第四禪以上貪猶未伏二顯離欲也出離想者三顯行相即作涅槃想也外道凡夫誤以無想天無心報執為𣵀槃也不恆行等者四顯所識多少也又云前之六識名不恆行𢿘間斷故違不恆行心及心所者顯六轉識全不行非如七八無不行猒粗動前六心心所起期願或一日或一劫住無心住其無心分位假立無想定又云想為首等者五釋定名也謂有心定令身心俱平等名安怡悅名和今無心定由定前心力令身心平等和悅如有心定亦名為定又云若六識皆何獨名無想想為首於加行位唯偏猒之故言為首首是頭首先首義故名無想天諸外道以想為生死因今偏猒之唯前六識想非第七八問第七八何不答又云七八微細彼不能知故不也雖總言六遠三近一有云遠者眼耳身三也近者意識一也鼻舌二識一界一地前斷訖眼耳身二界二地未也故遠三近一也有無學或有學聖第一明得人疏云有無學者六十六云即蕳二乘非俱解脫者不得入故此中獨覺亦有不得定者不以義今準此文故有獨覺不得定即部行中乃至亦有不得通者獨一者必得故或有學聖者除初二果唯身證不還以有學中有異生故以聖言蕳賢聖章云定慧二障全俱能盡名俱解脫能斷慧障未斷定障名慧解脫文上蕳慧解脫之意可見已伏或離等第二明得所以及伏斷差別也上貪不定者有云常論議也義云於貪定障俱行伏之不俱行不伏故云不定以定唯依非想定起故此依初修二乘者離菩薩不伏離貪由止息想第三明與前出離想別疏云止息想者謂二乘者猒患六識有漏勞慮或觀無漏心粗動若菩薩等亦欲發生無心寂靜似於𣵀槃㓛德故起俱舍論根品云若諸聖者乃至為求靜住暫欲息心故令不恆行等第四明識多少疏云恆行染者謂若二乘即除人空之染菩薩亦除法空之染各望自乘說為染故有云不恆行六識恆行染汙第七染汙一分也於此大小異也如本疏心心所言可通不恆行恆行無想異熟倫記景云對法二無心定及無想天皆言謂不恆行心心所之處建立故知但就彼天果報意識種子立無想天以彼種子前後相續體是果報無記於彼建立無想天故無想天亦名異熟文體是字俱舍根品頌疏云文者謂字如說惡阿一伊等字是不相應行中字不同此方墨書之字等依語聲分位差別瑜伽五十六云依假言說分位建立名身如名身句身文身當知亦爾相續不斷立流轉雜集二云於一剎那或於間斷無此言故因果種種差別者謂可愛果妙行為因不可愛果惡行為因諸如是等種種因果展轉差別又云因果相稱者雖復異類因果相順亦名相稱由如布𭤸感富財等又云因果一一流轉者謂不俱轉又云時者謂於因果相續流轉假立為時何以故有因果相續轉故若此因果已生已立過去時若未生立未來時已生未立現在時又云一一差別者於一無別二三等𢿘不應理故又云因果衆緣集會者且如識法因果相續必假衆緣和會謂根不壞境界現前能生次識作意正起如是於餘一切如理應知流轉倫云流轉中念念生斷還謝名剎那流轉三界往還名生展轉流轉三性等法起流轉名染淨展轉定異瑜伽論五十二云云何定異謂無始時來種種因果決定差別無雜亂性如來出世若不出世諸法法爾倫記定異中景云言相定異者如青黃等因定異者善惡別故果定異者苦樂別基云相定異謂因果中體相等相應景云善招樂惡招於苦因緣具時名和合相應如謂得住後時廢𡚶還依昔時誦經方便遂須歷得名方便相應隨作善惡稱加舊法所為成辦名所作相應基云方便相應謂加行智與一切根本事名方便也勢速倫云諸行勢速如一彈指頃經六百生士用勢速者如世間中斷根士夫三業速神通勢速者如屈申臂頃到色究竟等次第次第中剎那流轉次第者前念流轉次第內身流轉次第者如一身中十時次第成立所作流轉次第者如外器成立前後安布時者謂現在法當名過去未名未來正生名現在即於現在法上法相立三世三神通說三即諸佛等通力法爾有若對相現故謂現在法既曾有㓛能名過去當有㓛能名未來即現法上亦有爾所㓛能義說三世也方中對法亦云依色法因果建立諸方若據在方名方四蘊亦名為方故𢿘𢿘中云依法齊量表了分位立𢿘者或就意思或就語業表了分位假立為𢿘和合景云集會者如大衆聚假立名為集會一義和合者如立義支具足亦可諸心心所同起一境境名為義名一義和合圓滿和合者如彼世間眷屬圓滿基云一義和合謂同依一所作事圓滿和合謂得究竟時不和合又云不和合中若分位差別者景云若前後分位不和合若同若差別並立不和合命根二定等謂命根於第八種子假立心法分位二定心心所都分位假立心心所分位無想報亦爾異生性有分別起二障分位假立此心所分位也生無常此一句釋行字兼釋蕳無為故疏云行蕳無為文二十四法俱生無常法故蕳非無為三種成就所有染汙法等疏云即是一切見修煩惱三無記法任運起者及生得善所有種子皆是成就從無始來此等種子𢿘修習故生得善者義燈云生得善者生便得因循而生無勝㓛能所有種子但名生得染法未為等三性種子為奢摩他等不損伏於引發緣勢力自在名為種子成就此等未損等為奢摩他未損則緣合現行者或緣不合未現行者俱名成就不損伏則於引發緣勢力自在故倫記基云未為定伏等乃至名為成就等者此據㓛能不成就非體故對法云若得無漏對治道方名種子成就得不成就若生色界等欲界亦名成就其不成就性是何性如何今有別非得非得攝一切非得盡然今不立有何意也一為遮繁論亦應立同分及不流轉等故略不論命根細辨命根景師注云命根即依賴耶意根建立而言無所屬者此門通就果報色心分位假立為此無所屬今尋唯識論但依種子假立命根不依現行又解命根非色心故無所屬非取生識之義第八名言種子有二㓛能謂住識謂生果也明今不取生果以非根本次下文云由種生故此種不由現行有故種為諸法之根本故二無心定倫記云謂無想定唯厭於想作出離想修漸斷次能入若盡定從悲想心求上進心上進時求上所緣竟無所得無所得故便作暫時止息受想作意思惟從粗至細九品漸而不轉此二定中盡定者欲界身中初起以欲界有教依教修行故得初起後住四定及生四空皆得後起六十三云先於此起後於色界重起現前俱舍云二界初起定通於生後定不定業大乘業門明三時業及不定業皆通定與不定依下決擇文一切羅漢欲入無餘時要入盡定六識心唯住賴耶而命終也餘處文云唯欲界初起定者此約緣教若初學時必依欲界後初起時色界亦得如第三果人先欲界時未得此定生色界已方得此定即得初起然由先於欲界初聞此教後於色界方生又云謂二無心定無想異熟心無之處種子上而𭤸設故若其二定入定前心熏成種子於種子上有違心不起義邊而假建立無想異熟亦就彼無異熟種建立故又云猒心思種能無想故云能引發無想定思感彼異熟即說無想定能無想測云道理即無想定得無想論主據所依處故云思能彼天果基云定俱思能別報六種無為六種無為有解云為者為作造作之義也四緣所為作也有為作法必生無常也無為者離為作之義也若離為作法必不生不說名不動有云苦樂麁動法也生第四靜慮離苦樂二受之時立不動無為也理非𡚶倒故名真如疏云真以蕳𡚶如以別倒初蕳所執後蕳依他此五依至假𭤸設名又云善等真如約詮而論體唯是一此五為依真如上假名空等而真如體非如非不如故真如名亦是假立如食油蟲等不稱彼體唯言顯故文且如虗空無為真如體離諸障礙離其障礙分位假立虗空無為等蘊等三科無常已倫記明世中凡論有三一道理三世則依種子曾當義說有去來世當有名未來曾有名過去現有名現在於現在法上義說三故又云三世是時時無別法則就色心前後分位假建立時若已與果功能者立過去世若已與果及未與果㓛能現續立現在世若未與果功能當起立未來世俱舍界品頌疏云義有五門第一三世門無常已名過去若未已生名未來已生未謝名現在第二內外門自身名內所餘他身非情名外或約十二處辨眼等五根名內色等五境名外第三麁細門色有三種一有見相對謂色境也二無見有對謂眼等五根聲香味觸也三無見無對謂無表色也此三色中有體名麁無對名細或相待立如無見有對色望有見有對色名細望無對色名麁第四劣勝門染汙名劣不染名勝色十一中眼等五根香味觸八是無記性色聲兩種通三性無表唯善惡於三性中善無記名不染惡名染汙也第五遠近門去來名遠現在名近識生長門之義瑜伽論云處是何義諸心心所生長門義也頌疏云謂六根六境是心心所生長門處由六識生必詫根境方能起故界謂能持為義等雜集論第一取意文也全文云問何因界唯十八答由身具等能持過現六行受用生故身者謂眼等六根具者謂色等六境過現六行受用者謂六識能持者謂六根六境能持六識所依所緣故過現六識能持能受者不捨自相故當知十八以能持義故說名界曾現見色及此種子等對法論文述記二本引用之演祕二本亦釋疏文曰謂曾現見色等者釋論解云曾見色者謂能持過去識受用義以顯界性現見色者謂能持現在識受用義以顯界性釋曰受者取也即釋前現見義者是境即明前色由能持識根方取境故舉所持以明界也疏及此種子者釋論云謂眼種子或唯積聚為引當來眼故或已成就為生現在眼根釋曰由此種子能生二世現行眼根眼根因故亦名眼界乃至總以持因二義名界文曾現見色一句以持義釋界及此種子一句以因義釋界依眼緣色似色了別此二句釋眼識界能持義謂眼識能持所依眼根緣色境及變似本質相分了別義也及此種子下釋因義如色界相已下全雜集論文也就中處亦如界已下十八字非今所要當削去之三科因由於愚根樂等俱舍界品云所化有情有三品故世尊為說蘊等三門愚有三者或愚心所總執為我為說五蘊以五蘊中一蘊是色一蘊是心分心所法為受想行三蘊故說五蘊能破彼執或唯愚色總執為我為說十二處以十二處中十處是色唯意法非色故說處門能破彼執或愚色心總執為我為說十八界以十八界廣說色心十界是色餘是心故說界門能破彼執根亦有三者謂上中下根上根利說略便解為開五蘊中根稍遲說處方解下根最鈍要須廣說故為談界亦三者為樂略中及廣文故如其次第說蘊等三六種有漏唯識云以有漏言表漏俱故疏云以有漏言正表此法與漏俱故燈云今者此間表漏俱者取能有體名為有漏不取煩惱故漏自性測云若依薩婆多三義解漏從漏生能生漏故漏處所故名有漏今大乘六義解漏漏謂漏自性故乃至種類故廣說如對法論即此有漏能有四取名為有取燈云餘之五種由此自性名為有漏謂餘地法法者謂上界法也有解云求上定人修六行事觀𢿘猒下地欣上地時依彼欣厭力先初得初未至定以定相應修慧重修欣上厭下觀時定慧力殊勝故所伏彼蕳擇力欲界第六相應俱生煩惱不起故自身第八所持上定種子現行生也則上地第六意識現行與彼定相應也戌伏能障礙欲界煩惱得彼定已故亦擊發彼地色等諸法種子令現前自在也順決擇分依身在欲界依地第四禪定修四善根名順決擇分然則四善根上界所繫法也隨身界繫第七煩惱不增益上界同地煩惱得增益故云異地不增同地得增異地具漏俱一義同地具漏俱及增益二義於中以漏俱為有漏正因故論云以有漏言表漏俱故文順決擇分欲界異地第七煩惱不增益異地同地煩惱俱生俱故成有漏也或雖漏俱等順決擇分設異地設同地唯有漏俱義無互相增益義也論所謂現行煩惱俱生俱者通一切有漏互相增益文唯說決擇分外餘有漏也又云於第十回向滿心依地四禪定修暖等四善根名順決擇分故唯識第九云此四總名順決擇分順趣真實決擇分故異地不增等下地煩惱不能增益第四禪煩惱得增益也稱損力益能轉唯識云轉依位別略有六種一損力益能轉謂初二位由習勝解及慚愧故損本識中染種勢力益本識內淨種功能雖未斷障種實證轉依而漸伏現行亦名為轉然成有漏等唯識成立有漏義云現行煩惱俱生俱互相增益方成有漏文如是成立六種有漏中除漏隨順據餘五種漏說謂無學身燈云漏種類者無學諸蘊前生煩惱之所起故唯識云無學有漏雖非漏俱而從先時有漏種起故成有漏有漏正因正表漏俱疏云以有漏言正表此法與漏俱故謂諸有漏等疏云自身者蕳他身不縛己現行蕳種子唯種不轉故俱生俱蕳前後發相增益者互為緣相生義也由此等有漏現行起故熏成有漏種後時善等起有漏義成自相續中等疏云第六識中漏與𭤸等不俱起故非有漏正因雖亦由之發而傍因故有漏非是正因正因之言必俱起故雖由煩惱引等有解此有兩釋謂依無明起不知三界皆苦為求人天果發於行思造作𭤸等善業故云由煩惱引𭤸等業或由發業潤生煩惱感此身依於此身所造作故云由煩惱引等等成位有第六善心與煩惱不俱故第六相應煩惱非有漏正因也分極無漏諸漏永盡等疏云初是染法自性斷後是離縛斷初性唯染後通一切有漏言性淨者蕳二乘無學善有漏等蘊雖亦離二縛而性非淨前有漏類故有第七所知障漏俱非性淨故言圓者蕳一切有學無漏因未圓故明者蕳二乘無學無漏顯彼雖圓果之極故而非是明非勝妙故性等三境同學抄云於三類境廢立曾有異論南寺云偏於見分之境而論之北寺云亦通後二分之境性境樞要云一者性境諸真法體名為性境色是真色心是實心此真實法不定隨心三性不定如實五塵唯無記性不隨能緣五識通三性故從實種生等有云自有能生種子生起非如水月鏡像等是云從實種生也色等體用實有非如空華等是云有實體用也能緣心對彼之時心現量任運得境自相非如第七識之見分緣第八見分之時本質第八見分雖緣慮實見影像見分非緣慮法故能緣第七見分不得境自相是云得彼自相因緣變唯識云一隨因緣勢力故變二隨分別勢力故變初必有用後但為境疏云因緣者是諸法真實有用種子若用此種子故生諸法心緣變之變必有用以能生者實因緣故此相分等燈本文亦是性境下有相從質故四字餘法準知解云餘法指第八所變三種境乎有人論性境體云眼等五識及五俱意五同緣色等五境並第八所緣三種境故更可審思同學抄云問獨散意識緣自界五塵相分亦是性境攝耶答善珠為帶質境智周記為性境善珠為正獨影境樞要云獨影之境唯從見分性繫種子皆定同故如第六識緣龜毛空華石女無為他界緣等所有諸境如是等類皆是隨心無別體用假境攝故名為獨影有云偏依能緣分別力始反起非移本質不依本質獨反相故名獨影境也謂第六識搆畫分別緣空華等之時所變相分等也或有杖質等有解云問帶本質獨影境者何物哉答第六識緣無為所變相分也謂實無為不生不法無引起相分之力故此相分偏依能緣心分別力安立相分故獨影境問若全無引起相分力者何名本質耶答分別第六識聞說無為相心上分別安立變無為相此相分依聞教所說無為相起故似無為為本質故雖名本質真無為非分別心境界又不生不法無引起相分力故此時相分隨能緣心起獨影境也同一種生有云獨影境相分不熏種子不可然其故者獨影境無本質故雖假境非無法心前實現彼相分其體是有也龜毛空華都無者於本質名都無心內相分非都無法而一切有為法必自因緣種生獨影境相分若不熏自種從何生耶答雖無自熏種之力被帶見分熏自種之力生也謂見分緣空華帶空華之相熏自見分種子而此種子既帶空華相見分種子故後生見分現行之時亦帶空華相分生故雖無別自種被帶見分種子生也帶質境樞要云三者帶質之境謂此影像有實本質如因中第七所變相分得從本質是無覆無記等亦從見分是有覆所攝亦得說言從本質種生亦得說言從見分種生義不定故性種等隨應者隨應是不定義有二隨應一者義顯三境諸心聚生有唯有一有二二合有三同聚有一者如前已說有二合者如第八識緣自地散境心王所緣是初性境心所所緣是獨影境五識所緣自地五塵是初性境亦得說是帶質之境如第六識緣過未五蘊得是獨影亦得說是帶質之境熏成種子生本質故有三合者如四第八緣定果色心所所緣唯是獨影心王所緣是實性境亦得說為帶質之境第六所變定果色為本質故二者又性種等隨應者顯上三境隨其所應或性雖同而繫種不同如在下地緣上界天眼耳或繫雖同性種不同如緣五識自界五塵或種雖同而繫不同約聚論之即有一法論之即無如第八識聚心所所緣與見同種心王所緣而繫不同二合三合思準可知不得自相有解云問既正帶本質能緣心何不稱境哉答分別故不稱境自相也謂心對境之時唯有緣慮分別不起餘計度等分別時心一向逼苻此境自體無餘念故所變相分一向住本質變故得境自相若分別之時雖向本質不住本質作異相之分別依自力變故不稱境自相也答彼境不依等又云𪵬爾非云依帶本質名帶質境是不得自相而帶本質名帶質境也文然如性境雖帶本質不依能緣分別力故而得境自相心境俱真實故名性境也對獨影等又云言帶質境者對獨影一向無本質約有本質邊唯名帶質耳三種不隨樞要上未可撿三通情本解云情者能緣心本者本質也此下樞要上未可考性等同異如在下地等疏云如除如來得有漏通者身在下界地起上天眼耳及大扶根塵持第八識緣彼為境即自通力緣異地身文是即上界天眼耳與下界第八無記性故同也繫種不同易知如五識緣等前五識通三性五塵唯無記性故性不同也種不同易知下界五識緣下界五塵繫同也如第八識聚等第八識聚緣上界天眼耳等時心所邊得同種義心王邊得繫不同義也二三合等樞要上未可尋緣過未五蘊過未無體無本質故云獨影境也三藏伽陀下易解樞要上末應考四分種子且依一義以別種為正解云義燈雖有同種別種二義可存相質別種傳意云本質影像親踈所緣能生種子定可各別凡諸有體法其種各別也如有實體相見定別種也燈云相質種別理亦應好文且相質同種義有何過耶答燈有三過一種生慮非慮過二身根俱過一種生假實過也因等四緣謂有為法親辨自果疏云非一切法有為皆是今取親者此即總出體訖及起同時自類果此種現相望種現相望時因果非異時故云同時也此唯望彼約種種相望此指前種子彼指後生種子也約種現相望此指種子彼指現行也前種及種子俱為生自類果之因故云是因緣生也有云謂種子者現行習氣也此種子生現行法故為現行親辨自果辨生因緣也種為因現為果故也自類倫云自類者謂自種子類種子生種子自類相生故非即此剎那若種望現行名異類是即剎那此唯望彼是因緣生有云此現行熏生自習氣種故為所熏種子親辨自果自體辨生因緣也種為果現行為因故謂八現識等疏云八現識及心所者出緣體開者避義與後處義也導者招引義即前法避其處招引後令生自類者顯非他識為緣無間者顯雖前無間為後緣非中有間隔要無間者雖經百年等斷亦是此緣故等而開導者顯前一心為後心心所緣前一切心所為後一心緣意即齊等而開導故名等開導心所與心雖恆俱轉解云通難疏云問心與心所既非自類如八種識恆俱時轉體用各殊如何俱起望後並得互為緣義也謂若有法等疏云謂若有法者謂非遍計所執乃至所執無體不能發生能緣之識故非是緣緣者必是依他無為可有力用發能緣識名為緣是帶己相者疏云帶者是狹帶義相者體相非相狀義文明詮云己相者境相通體相與相狀二也體相為正所慮所詫者唯識義章私記云所慮者緣慮義又顯所緣義也所詫者依詫義又顯緣義若與能緣體不相離是見分等疏云蕳他識所變及自八識各別內所慮詫也謂若有法等疏云若有法亦是有體此蕳所執乃至能於餘法者蕳其自體顯不同前所緣緣故或順或違顯與違順能為緣與後生異法為緣非前法雖前三緣等有云前三緣亦雖有此義而彼等依別義立別緣故除彼緣外餘諸法踈助緣皆為增上緣也住成得疏云風輪上令住水輪等住增上緣也成者成立義得者明詮道云證得𣵀槃等通有為無為疏云今此所說是順所生此緣之果若違之果一切皆通令不生不住不成不得故種子二緣現行望自親所熏種此約現行為因種子為果邊非親種且以現行眼識望餘色心等種子則皆名非親種非眼親熏故此一章疏八本文全文云與非親種不辨體故除自種外但一增上種望親種等疏全文云於異性非親種亦一增上因果同時三法展轉解云三法者能生種子所生現行所熏種也如炷生熖疏云舉增上緣喻因緣義如燈炷與燈熖展轉生燒由炷生熖如種生現由熖燒炷如現熏種故名展轉此影三法解云初舉三法喻喻三法體後舉二法喻喻因果義因果俱時理不傾動疏云不同經部因果異時故說俱時理不傾動名言種子名言種子有云一切三性色心諸法親因緣種子名名言種子疏云但此名言分為二種攝一切法習氣盡也第六識依名等為先熏五蘊三性等一切法種子名表義名言七轉識心心所不待能詮名言自了境界熏種名顯境名言此一章同學抄取意也名最勝故疏云從勝為因但說名言熏習一切七識等第八非能熏故除之本文非相分心下有不能顯境故五字顯所詮法下有此心心所能顯所了境如彼故名之為名體非名名體是彼不相應行故等字疏云一切熏種皆由心心所心心所熏種有因外緣有不依外不依外者名顯境名若依外者名表義名執非執受倫記云七明執受及非執受景云五執受者五根五執受非執受者五塵也不離根者為識執離根則非執受對法云眼等五全四一分謂不離根色香味觸此中云五通受非受者以聲起時不離根故說為執受基云大乘真理唯第八名能執受若隨順理門通六識測云以離於彼五根五外境餘心法為能執受執受於彼根境可得故彼根境是所執受然離於彼心心所法外餘非心法為能執受執受於彼心心所法不可得故八界非執受有根身唯識云有根身謂諸色根及根依處十二因緣發業潤生煩惱對法四云一切欲界分別煩惱皆發業潤生煩惱指愛取感後有諸業疏云即通一切總報別報現後等業除無記業及無漏業皆名為業能感異𤏅故衆苦名苦又云苦中攝三苦八苦惑業苦種至親生苦故四十字疏以三種望果談其親踈文也與行得為因緣依癡無明於三業造作諸業故行支疏云行者當體彰名造作是行義心心所為體指與思同時俱行心心所也行體是思解云此思第六相應思問思心所是遍行故與八識相應何故唯第六相應思成業答發業非任運必依意樂力以故思成也無意樂識不可發業故唯限第六相應思也問依意樂力義如何答發業必依尋伺推度分別力或發語言讀誦經典或發身業行殺生等事業也而餘識不與尋伺相應故無此義也唯取阿賴耶識親因緣為體疏引瑜伽九十三云在母胎中因識為緣續生果識隨轉不絶任持所有羯剌藍等非餘七識隨轉不絶任持故彼下文云又即此識當來後有名色等種之所隨遂非餘七識諸種所隨故愛取合潤等疏云取前行及五果種為愛取潤已轉名為有又云此二和合潤能引之中業及所引因五種轉名為有何以名有此六俱能近有生等後有果故謂從中有至皆生支攝明生支分位也老死疏云老死即前五蘊變因果定不同世疏云前十支因與後二支果定不同世以總異𤏅因非造之身即受果故亦非現業得果是十二支故約身死生為世十因二果決定不同或異或同疏云若順生受業受初生時其世必同命終位愛取潤業故同世第二生已去乃至後報業等世不同也今身造業至後後世將愛果時方起愛取故若二三七等又云由癡發業熏發報種必定同世故前七支不得別世起煩惱水潤前六種轉名為有亦非異時非起能潤隔世異時方成所潤生及老死同世可知無明細辨取發業者疏云謂能發起善不善業故五無明唯取前四前四中有能發業謂見道全修道一分文疏取分別俱生為體然有人局取分別癡無明恐不是𦔳發惡趣至多唯見斷會瑜伽五十九言發惡趣之行唯分別惑文曰瑜伽言唯分別惑助發惡趣總報業多唯見斷故約多分言唯分別惑耳名為相應唯識云若貪等俱者名相應無明不與本俱名為不共不共無明有二種謂恆行不共獨行不共今文明獨行不共也一恆行不共無明第七相應無明也謂雖與貪等餘惑俱一切凡夫心恆行無間斷不共餘六識相應無明故名不共無明也非不餘惑俱義二獨行不共無明謂非貪等餘本惑俱唯獨起與心相應故名不共無明對相應無明名不共也疏云但言非貪等俱即令知第六識俱無明非謂第七不障與忿等二十俱起故知唯在第六識也主獨行有云主獨行非與忿等小隨惑俱獨行無明也謂獨行無明者非與貪等餘本惑俱義也非遮隨惑其中主獨行無明亦非隨惑之中忿等俱也問何故依此義名主耶答忿等十惑行相粗猛各為主法也若與彼俱時此無明成伴非主若非與彼俱時此無明獨為主故也非主獨行又云即與忿等俱獨行無明也亦主獨行於獨行不共無明建立故獨行無明有二類一主獨行無明二非主獨行無明也然多說主獨行諸經論中多取主獨行為十二支中無明迷因果理等以下釋經論偏取主獨行所由依無明起迷三界皆苦理希求人中天上善趣生由此發行思造善業又迷皆苦理不恐當果故造不善業也十一殊勝發業位無明力增解云正發業無明為局一念起為通多念起若多念起何念為正發業耶答無明多念相續中正發業用取初念無明力增勝故惑業生本故依無明不了起一切業起一切煩惱是則無明起惑業根本因緣勝法一切有漏無漏善法廣法謂真如理體無邊際故有頂悲想天二十五有頂名有頂行支細辨順現受業疏云一切現業皆唯能感別報果文順現受業者若於現法中異熟成就謂從慈定起已於彼造作若損若益必得現異熟五種熏發名言熏習名言謂一切七識見分等心見分心等實非名言如言說名顯所詮法此心等顯所了境如彼故名名言見分等心熏色心等種名熏習於生死位此一段疏八末文死疏作老能生自果下有於生老位觸種子生觸現行等字識等次敘當來生起分位有解云光云實當來其體性如此非前後生起是分位門前後也雖識支最初生起餘不生起與體同時有六處支體第八所變五根故應有觸受第八相應心所故詫生一剎那位名色等餘支相貌隱而識支相貌顯也餘分位可準之如此當來生起分位有於前後今於現在種子上說識等五支也實五支前後相貌不可有因種子上寄當談之也謂續生時以下唯識論第八文也疏云於當來初生之時果識初起即是因識相顯以果初生令識種用顯故名因識相顯也即初剎那或說一七日次識位後五根未滿已來果名色起令因名色相貌增長以果顯時令因增故即四七日以前此中五支皆應有因但識中說文影通下次前名色四七日後五根滿時至鉢羅奢因六處明盛根相利故依此六處發觸相顯依觸起受因受相增爾時乃名受果究竟依此當起果位次第立因支為五愛取潤業且依初後等疏云今者且依愛之初後分愛取二其實有多現行愛惑十地第八經云愛增名取故初名愛後名取也倫記云五十九云當言全界一切煩惱皆能結生相續愛既唯貪故取通攝諸煩惱盡然此中說緣四取貪為取支者與十地經同彼云愛增上名取成唯識說於潤業位愛力偏增說愛如水能滋潤故要𢿘溉灌方生有牙且依初後分愛取二雖取支中攝諸煩惱而愛潤勝說是愛增故彼此文不相乖返愛取二支通現及種俱能潤故愛望於取成因緣故潤生相貌易解不記中有愛潤若有於此至結生相續無著論文也無性釋云非等引地所謂欲界沒即是死依中有位者謂依生死二有中間起染汙者與愛恚俱有顛倒故釋云男女互於父母之處起貪恚也言意識餘識爾時久已沒故釋云餘眼等識中有末位而久已唯意識在中有初中六識皆有連持生故名為相續攝受生故名為結生與赤白渧等無性釋曰識與赤白損益并俱和雜成身羯羅藍倫記云羯羅藍者此名雜穢亦名和合此為最初衆苦因起損惱既廣喻立箭名俱舍名㓨稀未稠也能所引生文相可知緣起得名瑜伽論第十倫記云第七釋詞中有五復次依字釋名者由煩惱繫為緣往諸趣中𢿘𢿘生起故名緣起依緣字起字釋緣起字故名依字景師云由諸煩惱繫往諸趣中釋緣字也𢿘𢿘生起者釋起字也依剎那義釋者蕳大衆部化地部等緣起是無為亦正量部一期四相義衆緣過去而不離等者若依分位前十支為緣後二支為起前支具因緣等四雖後剎那入過去種在身中而不捨離故依自身後果生起或十二支前一一為緣一一為起𢿘𢿘謝復相續起者𢿘𢿘逢緣而續起故名緣起於過去世覺緣性已等相續起者初證菩提時覺悟緣性已後為有情發起語言說之故名緣起自利稱緣利他名起即是法輪展轉說義五性各別十卷入楞伽樞要云依十卷楞伽經中第二卷末四卷者第一卷說大分亦同佛告大惠有五種性證法一聲聞乘性二辟支佛乘性三如來乘性四不定乘性五無性謂一闡提此有二種一者焚燒一切善根則菩薩藏一者憐愍一切衆生作盡一切衆生界願是菩薩也若衆生不入𣵀槃我亦不入大惠白佛此二何者常不入𣵀槃佛言菩薩常不入𣵀槃非焚燒一切善根者以知諸法本來𣵀槃不捨一切諸衆生故大莊嚴論又云大莊嚴論第一卷種性品說五種種性三乘定及不定四同瑜伽第五性中說有二種一時邊二畢竟時邊有四頌曰一向行惡行普斷諸白法無有解脫分善少亦無因畢竟無者以無因故此中時邊應云暫時則暫時無圓寂法餘義如樞要上本及倫記九下等說三時教相遂分三時梵網經述記云謂如來一代所說宗不過三種一者隱空顯有宗謂四諦法輪等諸小乘經二者隱有說空宗者諸部般若等無相之教此即名無相法輪三者遠離二邊宗者謂解深密等了義大乘此即名為顯了法輪義燈云問何故如來初說有教中談空教後演不空不有教耶答據不定性未發趣時且令漸悟所執我無唯有蘊處界等諸法名為有教為已發趣得小果者令趣於大次悟法空觀彼所執界處等無名為空教後為發趣一切乘者顯所執無非執是有非一向空亦非皆有為不空不有教定有七名一名三摩呬多倫記云此云等引舊云三摩提訛略也基師解云此有七名一云三摩呬多釋論解云謂勝定地離沈掉等平等能引或引平等或是平等所引發故名等引地此卷下云非於欲界心一境性由此定等無悔歡喜安樂所引故即以三義解等引一等能引二引平等三平等方便所引發故能引所引俱平等也唯定非散燈云等引通有無心唯定非散瑜伽五十一云非於欲界心一境性等持有心通定及散二名三摩地又云二云三摩地此云等持舊云三昧訛也三名三摩鉢底又云此云等至舊云三摩跋提訛也四名馱衍那又云此云靜慮舊云禪義不正也或云持阿那訛也五名質多翳迦阿羯羅多倫云此云心一境性質多名心翳迦云一阿羯羅云境多云性舊云一心略也六十三云問何因緣故說諸靜慮名心一境性答略有二種所緣境界一不定地所緣境界二者定地所緣境界此中一境所謂定所緣境界非第二境繫心於此一所緣境是故說名心一境性餘如倫記委辨從果得名現法樂住謂由四禪定力離見慢等得清淨故定之果也聞等三慧局在八地已上義燈三慧章中邊疏等意也同學抄傳云義說三慧者一念中能起聞思修三用更無勝劣故十地經說第十地云能堪能思能持矣堪思持皆加能字顯三用俱勝也七地已前地位淺有㓛用位故一時唯有一用餘用劣也聞思二用相違文義不同故一體修慧難備兩用者也八地已上聖智迅速位一時能起三用謂能取外境等三慧章文也本文外境境字作教有云義說三慧者修慧上以義說聞思二慧也謂修慧文義並照慧故照文用名聞慧照義用名思慧文義俱明了用名修慧也七地以前等以下通伏難同學云凡三慧有多重一有漏三慧唯是別體也二無漏三慧此有二類一別體謂在七地已前二義說即八地已上文既初地以上無漏三慧於中但八地以上義說七地以前別體何乎四重出體一攝相歸性體對法疏云凡論出體總有四重一攝相歸性體即一切法皆性真如無垢稱云一切衆生皆如也一切法亦如也有無為有別體法是如之相攝境從識體又云即一切法皆是唯識故心所不離心華嚴等說三界唯一心攝假隨實體又云攝假隨實體即諸假法隨何所依實法為體如不相應色心分位即以所依分位為體此論下說不相應中假立門是也性用別論體又云性用別論體色心假實各別處收有解云諸法體用等各各別論非相從門也故不故思此與意俱故作動意故疏云前二審慮決定思與意俱故作動意故名意業文次上云意相應業名意業鄰近釋彼或錯亂等解云前二思具足則正發業時或錯亂或不錯亂俱名故思業增不增長業倫記增長不增長業中自性無記業者基師解云善不善非業道攝中下品性非三性中無記性也自體不增名無記故或三性中無記之業定不定業定受業倫記云定受業者故思所造重業作亦增長不定受業者故思所造輕業作不增長者是也非故思造業是其不定易了不論由田故者倫云謂於有恩者父母及若住正行者即四向及正行果者即四果及佛等也此於有恩及敬田作善惡業三業四業順現法受業倫云順現法受業等此及對法皆說有三從初為名現唯別報餘通總別謂從慈定起等俱舍業品疏云一從定出謂此定中得心寂靜以無心故極似𣵀槃故初出此定是勝上依身二從無諍定出謂此定中止他煩惱謂緣無量有情為境故初出此定無量勝㓛德熏身相續轉三從慈定出謂此定中緣無量有情為境增上安樂意樂隨遂故初出此定無量勝㓛德熏身相轉四從見道出謂此見道永斷見惑故初出定時淨身續起五從修道出謂此道中永斷修惑得阿羅漢故出此道時淨身相續起此上五種取初出定名㓛德田又於佛為上首等倫云對法說佛為上𩠐僧謂對佛前諸所有僧或是佛弟子凡聖無學僧名佛為上𩠐僧此言僧故非是別人定不四業時定而報不定問若時不定異𤏅可不定若異𤏅不定時亦可不定受報時既決定何有報不定義答雖受報不定若遇緣受者順次生等定也譬如干地植種具雨露增上力生果其時決定春分也解云此喻分明此果雖春分可生時決定因雨露緣有無結果不定也如是造業時此果或雖順生等定隨緣有無取所定果不定故決定三業倫記云對法論說決定受業者決定有三一作業定由宿業力感決定身於此生生中必造此業期限決定終不違越佛等神力亦不能制二受異熟定即此所說順定受業果定當受時未定故三分位定謂順現受生受後受分位定業此中義顯若業道攝業名順定受加行後起通定不定若未悔未解脫說名決定業已悔已解脫名不定業此云作及增長者作作現業增增種子故也五種故思倫記對法論說有五種故思造業一他所教敕二他所勸請三無所了知四根本執著謂三毒蔽心猛利執著所起諸業五顛倒分別謂勝無罪所行惡業於此五中根本執著顛倒分別若作若增長非不受異熟重故餘三雖作而不增長不必受異熟輕故彼論釋作者起造諸業令其現行增長者謂令習氣增益故思業者謂故思已若作業若增長業者此中故作或增長名故思業非故作或增長名不故思業對法論說故思業與此相違通增長不增長故此依殊勝強思當定招異熟名故思業彼依但是故思所作非任運業通當得果皆名故思所望別故亦不相違福等三業一福業謂感欲界善趣異熟倫記云謂感善趣異熟等者福業於人天受總異熟及順五趣受者四趣受別異熟其地獄中受等流果相似別報總言順五有義不然成唯識說餘處說彼有等流應知彼依隨轉理說故大乘中彼無善果由善業故受苦輕微名為得果更無別報不同小乘地獄四塵復善業感又釋離非天為一合成六趣故說善業順五趣有地獄實無備云有義善業亦得能感地獄別果故如小地獄得涼風等後是五趣別業也疏云且福之名通三界滿業然說地獄亦有別善業者受等流果如涼風觸身等與別相似業名為善也又令地獄諸苦輕微名為善業此業以定所攝等解云此約異熟不可改轉義釋不動或定地攝名為不動此約定地所攝釋不動也不動業解云不動者不可改轉義如欲界餘趣業遇緣轉得餘趣處受此業不爾定於自處受故何故爾也定所攝故不同散業若爾如何熏禪人資下故業生五淨居故此解非也又定地攝名為不動以定能住於一境此釋為勝又不還果等聖者凡夫時已造生第四禪中福生等下三天業已今雜修第四禪由無漏資此故業轉生五淨居也
